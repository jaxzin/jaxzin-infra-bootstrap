---
# Deploy a Gitea Actions runner as a single socket-mounted container.
# Host-agnostic. Runs OVER SSH on GITEA_RUNNER_HOST under become: true (the
# controller is a separate home-network machine — see
# docs/runbooks/gitea-runner-host.md); community.docker tasks execute on the
# TARGET, driving its Docker daemon through the bind-mounted socket. The
# runner_host_seed role installs the Docker SDK on the target beforehand.
#
# The runner registration token is NOT minted here. This role is
# deliberately API-free — a pure consumer with no dependency on Gitea API
# reachability, admin credentials, or TLS. Minting needs the Gitea ADMIN
# API, which Play 1 already holds on the NAS (loopback admin API, with
# gitea_api_token a fact from gitea_server); it mints there and passes the
# value in via `gitea_runner_token` (hostvars) — the same cross-play
# pattern the admin token uses.

- name: Assert the runner registration token was provided by the deploy
  assert:
    that:
      - gitea_runner_token is defined
      - gitea_runner_token | string | length > 0
    fail_msg: >-
      gitea_runner_token is empty. It must be minted by gitea-deploy.yml
      Play 1 on the NAS (loopback admin API) and passed to this play via
      hostvars. This role deliberately does NOT call the Gitea API — it is
      an API-free pure consumer. See docs/runbooks/gitea-runner-host.md.
    success_msg: "Runner registration token supplied by the deploy."

- name: Preflight — assert the Docker daemon is reachable on the target
  # Pure consumer: this role NEVER installs Docker. runner_host_seed (or the
  # target's own IaC) provides it. Fail fast with an actionable message.
  community.docker.docker_host_info:
  register: gitea_runner_docker_info
  failed_when: gitea_runner_docker_info is failed
  # If this fails: the target has no working Docker daemon / the SSH user is
  # not in the docker group. Run runner_host_seed first. See
  # docs/runbooks/gitea-runner-host.md.

- name: Preflight — assert the host is on the tailnet
  # The runner CONTAINER egresses to Gitea via the host's kernel-mode
  # Tailscale. No tailnet → the runner can't reach gitea.<tailnet>.
  ansible.builtin.command:
    cmd: tailscale status
  register: gitea_runner_ts_status
  changed_when: false
  failed_when: gitea_runner_ts_status.rc != 0

- name: Ensure Gitea runner config directory exists
  file:
    path: "{{ gitea_runner_config_file_parent }}"
    state: directory
    mode: '0755'

- name: Ensure Gitea runner config file exists
  template:
    src: config.yaml.j2
    dest: "{{ gitea_runner_config_file }}"
    mode: '0644'
  notify:
    - Restart Gitea runner

# Single deploy variant. The runner reaches the tailnet (to talk to Gitea
# and for jobs that ssh tailnet hosts) through the HOST's Tailscale, not a
# sidecar — so plain bridge networking is correct here. Job containers are
# spawned on the host's Docker daemon via the bind-mounted socket, so they
# inherit the host's networking and DNS directly. `network_mode: bridge`
# is explicit (never `container:<sidecar>` — see tests/check_docker_tasks.py
# Check E and docs/runbooks/gitea-runner-host.md).
- name: Deploy Gitea runner container (socket-mounted)
  community.docker.docker_container:
    name: gitea-runner
    image: "{{ gitea_runner_image }}"
    state: started
    restart_policy: always
    network_mode: bridge
    env:
      CONFIG_FILE: "/data/conf/config.yml"
      GITEA_INSTANCE_URL: "{{ gitea_instance_url }}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "{{ gitea_runner_token }}"
      GITEA_RUNNER_NAME: "{{ gitea_runner_name }}"
    volumes:
      - "{{ gitea_runner_data_path }}:/data"
      # Socket-mount: job containers run on the host's Docker daemon. This
      # is the deliberate single-tenant trade-off that retires dind (see
      # docs/runbooks/gitea-runner-host.md "Security trade-off").
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD-SHELL", "grep -q act_runner /proc/[0-9]*/comm 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 2m
