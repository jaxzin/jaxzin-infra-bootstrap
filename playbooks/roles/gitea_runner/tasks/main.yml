---
# Deploy a Gitea Actions runner as a single socket-mounted container.
# Host-agnostic by design — see defaults/main.yml and
# docs/runbooks/gitea-runner-host.md for the host contract. This role runs
# with become: false: every path below lives under the deploy user's own
# data dir and Docker is reached via the user's `docker` group membership.

- name: Ensure Gitea runner config directory exists
  file:
    path: "{{ gitea_runner_config_file_parent }}"
    state: directory
    mode: '0755'

- name: Check if Gitea runner token is already persisted
  stat:
    path: "{{ gitea_runner_config_file_parent }}/runner_token.txt"
  register: runner_token_file
  check_mode: no # Don't skip this task in check mode

- name: Load Gitea runner token from remote file if it exists
  block:
    - name: Read Gitea runner token from remote file
      command: "cat {{ gitea_runner_config_file_parent }}/runner_token.txt"
      register: runner_token_content
      changed_when: false
    - name: Set Gitea runner token fact
      set_fact:
        gitea_runner_token: "{{ runner_token_content.stdout | trim }}"
  when: runner_token_file.stat.exists
  check_mode: no # Don't skip this task in check mode

- name: Generate and persist Gitea runner token if it does not exist
  when: not runner_token_file.stat.exists
  block:
    # Minted over the tailnet instance URL (gitea_runner_api_base_url),
    # reachable from this tailnet host — NOT the NAS-loopback API. The
    # admin token (gitea_api_token) is provided by the caller; in the
    # bootstrap deploy it comes from the gitea_server play via hostvars.
    - name: Get Gitea runner registration token
      uri:
        url: "{{ gitea_runner_api_base_url }}/api/v1/admin/runners/registration-token"
        method: GET
        headers:
          Authorization: "token {{ gitea_api_token }}"
        validate_certs: "{{ gitea_runner_api_validate_certs }}"
      register: new_runner_token_result

    - name: Set runner token fact from new token
      set_fact:
        gitea_runner_token: "{{ new_runner_token_result.json.token }}"

    - name: Persist the new runner token to the filesystem
      copy:
        content: "{{ gitea_runner_token }}"
        dest: "{{ gitea_runner_config_file_parent }}/runner_token.txt"
        mode: '0600'

- name: Ensure Gitea runner config file exists
  template:
    src: config.yaml.j2
    dest: "{{ gitea_runner_config_file }}"
    mode: '0644'
  notify:
    - Restart Gitea runner

# Single deploy variant. The runner reaches the tailnet (to talk to Gitea
# and for jobs that ssh tailnet hosts) through the HOST's Tailscale, not a
# sidecar — so plain bridge networking is correct here. Job containers are
# spawned on the host's Docker daemon via the bind-mounted socket, so they
# inherit the host's networking and DNS directly. `network_mode: bridge`
# is explicit (never `container:<sidecar>` — see tests/check_docker_tasks.py
# Check E and docs/runbooks/gitea-runner-host.md).
- name: Deploy Gitea runner container (socket-mounted)
  community.docker.docker_container:
    name: gitea-runner
    image: "{{ gitea_runner_image }}"
    state: started
    restart_policy: always
    network_mode: bridge
    env:
      CONFIG_FILE: "/data/conf/config.yml"
      GITEA_INSTANCE_URL: "{{ gitea_instance_url }}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "{{ gitea_runner_token }}"
      GITEA_RUNNER_NAME: "{{ gitea_runner_name }}"
    volumes:
      - "{{ gitea_runner_data_path }}:/data"
      # Socket-mount: job containers run on the host's Docker daemon. This
      # is the deliberate single-tenant trade-off that retires dind (see
      # docs/runbooks/gitea-runner-host.md "Security trade-off").
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD-SHELL", "grep -q act_runner /proc/[0-9]*/comm 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 2m
