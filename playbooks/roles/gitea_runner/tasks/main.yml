---

- name: Ensure Gitea runner config directory exists
  file:
    path: "{{ gitea_runner_config_file_parent }}"
    state: directory
    owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    group: "users"
    mode: '0755'

- name: Check if Gitea runner token is already persisted
  stat:
    path: "{{ gitea_runner_config_file_parent }}/runner_token.txt"
  register: runner_token_file
  check_mode: no # Don't skip this task in check mode

- name: Load Gitea runner token from remote file if it exists
  block:
    - name: Read Gitea runner token from remote file
      command: "cat {{ gitea_runner_config_file_parent }}/runner_token.txt"
      register: runner_token_content
      changed_when: false
    - name: Set Gitea runner token fact
      set_fact:
        gitea_runner_token: "{{ runner_token_content.stdout | trim }}"
  when: runner_token_file.stat.exists
  check_mode: no # Don't skip this task in check mode

- name: Generate and persist Gitea runner token if it does not exist
  when: not runner_token_file.stat.exists
  block:
    - name: Get Gitea runner registration token
      uri:
        url: "{{ gitea_api_base_url }}/api/v1/admin/runners/registration-token"
        method: GET
        headers:
          Authorization: "token {{ gitea_api_token }}"
        validate_certs: no
      register: new_runner_token_result

    - name: Set runner token fact from new token
      set_fact:
        gitea_runner_token: "{{ new_runner_token_result.json.token }}"

    - name: Persist the new runner token to the filesystem
      copy:
        content: "{{ gitea_runner_token }}"
        dest: "{{ gitea_runner_config_file_parent }}/runner_token.txt"
        owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
        group: "users"
        mode: '0600'

- name: Ensure Gitea runner config file exists
  template:
    src: config.yaml.j2
    dest: "{{ gitea_runner_config_file }}"
    owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    group: "users"
    mode: '0644'
  notify:
    - Restart Gitea runner

# --- Runner container deployment (conditional on Tailscale) ---

# Healthcheck used by both deploy variants below. Detects the s6 init wedge
# observed 2026-05-02 after a NAS dirty restart: dockerd inside the runner
# came up, but s6 didn't fire its docker-ready signal, so act_runner stayed
# blocked on `s6-svwait -U /etc/s6/docker` and never started polling. Docker
# saw the container as "Up" the whole time. The healthcheck below greps
# /proc for an act_runner process; if missing, Docker marks unhealthy and
# `restart_policy: always` recreates the container (which re-runs s6 init,
# usually clean the second time).
#
# We can't `pgrep act_runner` because the dind image doesn't ship pgrep —
# fall back to `grep -q act_runner /proc/*/comm`. The `[a]` trick avoids
# matching the grep itself.

- name: Deploy Gitea runner container (with Tailscale sidecar)
  community.docker.docker_container:
    name: gitea-runner
    image: "{{ gitea_runner_image }}"
    state: started
    restart_policy: always
    network_mode: "container:{{ tailscale_runner_container_name }}"
    privileged: true
    env:
      CONFIG_FILE: "/data/conf/config.yml"
      GITEA_INSTANCE_URL: "{{ gitea_instance_url }}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "{{ gitea_runner_token }}"
      GITEA_RUNNER_NAME: "nas-runner"
      DOCKER_INSECURE_NO_IPTABLES_RAW: "1" # needed for Docker-in-Docker on the Synology DSM which does not include iptables_raw kernel module
    volumes:
      - "{{ gitea_runner_data_path }}:/data"
    healthcheck:
      test: ["CMD-SHELL", "grep -q act_runner /proc/[0-9]*/comm 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 2m
  when: tailscale_enabled | default(false) | bool

- name: Deploy Gitea runner container (standalone)
  community.docker.docker_container:
    name: gitea-runner
    image: "{{ gitea_runner_image }}"
    state: started
    restart_policy: always
    memory: "{{ gitea_runner_memory_limit }}"
    memory_swap: "{{ gitea_runner_memory_swap }}"
    networks:
      - name: "{{ gitea_network_name }}"
    dns_opts:
      - "ndots:0"
    privileged: true
    env:
      CONFIG_FILE: "/data/conf/config.yml"
      GITEA_INSTANCE_URL: "{{ gitea_instance_url | default('https://' + gitea_domain + ':' + gitea_port) }}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "{{ gitea_runner_token }}"
      GITEA_RUNNER_NAME: "nas-runner"
      DOCKER_INSECURE_NO_IPTABLES_RAW: "1" # needed for Docker-in-Docker on the Synology DSM which does not include iptables_raw kernel module
    volumes:
      - "{{ gitea_runner_data_path }}:/data"
    healthcheck:
      test: ["CMD-SHELL", "grep -q act_runner /proc/[0-9]*/comm 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 2m
  when: not (tailscale_enabled | default(false) | bool)
