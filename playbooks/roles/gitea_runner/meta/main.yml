---
galaxy_info:
  author: Brian R. Jackson
  description: >-
    Deploys a Gitea Actions runner as a single socket-mounted container on
    any Linux Docker host. Host-agnostic — no Synology/DSM, dind, or
    Tailscale-sidecar coupling. See docs/runbooks/gitea-runner-host.md.
  license: MIT
  min_ansible_version: "2.12"
  platforms:
    - name: GenericLinux
      versions:
        - all

argument_specs:
  main:
    short_description: The main entry point for the gitea_runner role.
    options:
      gitea_api_token:
        type: "str"
        required: true
        no_log: true
        description: >-
          Gitea admin API token, used once to mint the runner registration
          token. In the bootstrap deploy it is resolved via hostvars from
          the gitea_server play; it is NOT a property of the runner host.
      gitea_instance_url:
        type: "str"
        required: true
        description: >-
          URL the runner connects to Gitea on (the tailnet Serve URL,
          e.g. https://gitea.<tailnet>). The runner host must be able to
          reach this — see expectation #3 in the role's host contract.
      gitea_runner_api_base_url:
        type: "str"
        default: "{{ gitea_instance_url }}"
        description: >-
          Base URL the runner host uses to reach Gitea's admin API to mint
          its registration token. Defaults to the tailnet instance URL
          (reachable from the tailnet runner host) — deliberately NOT the
          NAS-loopback gitea_api_base_url, which is meaningless here.
      gitea_runner_api_validate_certs:
        type: "bool"
        default: true
        description: "Validate TLS on the registration-token call (Serve certs are valid)."
      gitea_runner_image:
        type: "str"
        default: "gitea/act_runner:0.2.12"
        description: "Plain (non-dind) act_runner image."
      gitea_runner_name:
        type: "str"
        default: "gitea-runner"
        description: "Display name the runner registers under."
      gitea_runner_data_path:
        type: "str"
        description: >-
          FIXED host directory for runner state (default /opt/gitea-runner).
          Never a ~ path: the role runs in the CI container (connection:
          local) and the host Docker daemon bind-mounts this same host
          path into the runner container, so it must be coherent across
          both (the CI job bind-mounts it; bootstrap-runner.sh provisions
          it).
      gitea_runner_config_file_parent:
        type: "str"
        default: "{{ gitea_runner_data_path }}/conf"
      gitea_runner_config_file:
        type: "str"
        default: "{{ gitea_runner_config_file_parent }}/config.yml"
