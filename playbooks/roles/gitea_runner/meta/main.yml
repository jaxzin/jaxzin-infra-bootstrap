---
galaxy_info:
  author: Brian R. Jackson
  description: A role to deploy and manage the Gitea runner.
  license: MIT
  min_ansible_version: "2.12"
  platforms:
    - name: GenericLinux
      versions:
        - all

argument_specs:
  main:
    short_description: The main entry point for the gitea_runner role.
    options:
      gitea_data_path:
        type: "str"
        required: true
      gitea_domain:
        type: "str"
        required: true
      gitea_port:
        type: "str"
        required: true
      gitea_api_token:
        type: "str"
        required: true
        no_log: true
      gitea_runner_image:
        type: "str"
        required: true
      gitea_network_name:
        type: "str"
        required: true
      gitea_runner_data_path:
        type: "str"
        required: true
      gitea_api_base_url:
        type: "str"
        required: true
        description: "Base URL for Ansible API calls (e.g. http://127.0.0.1:8443)."
      gitea_instance_url:
        type: "str"
        required: false
        description: "URL for the runner to connect to Gitea (defaults to https://domain:port)."
      tailscale_enabled:
        type: "bool"
        required: false
        default: false
        description: "When true, use network_mode container sharing with Tailscale sidecar."
      tailscale_runner_container_name:
        type: "str"
        required: false
        default: "tailscale-runner"
        description: "Name of the Tailscale sidecar container for the runner."
