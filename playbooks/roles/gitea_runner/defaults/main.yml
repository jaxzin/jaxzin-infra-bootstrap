---
# =============================================================================
# gitea_runner role — host contract
# =============================================================================
# This role deploys a Gitea Actions runner as a single, socket-mounted
# container. It makes NO assumptions about the host OS. It is deliberately
# decoupled from the rest of this repo (which targets a Synology DSM NAS):
# the runner can run on any Linux Docker host.
#
# Top-level expectations of the target host (the full contract — and the
# only things this role depends on — are documented in
# docs/runbooks/gitea-runner-host.md):
#
#   1. Linux with a running Docker Engine daemon.
#   2. The role runs OVER SSH on GITEA_RUNNER_HOST under become: true (the
#      controller — a separate home-network GitHub runner — connects via
#      ansible_ssh_private_key_file; see common-bootstrap.yml). community.docker
#      tasks execute on the TARGET, driving its Docker daemon directly via the
#      docker group; the runner_host_seed role installs the Docker SDK on the
#      target first (pip), so it is NOT bundled for this play in the controller
#      image. The SSH user must be in the docker group.
#   3. The HOST is a tailnet node (kernel mode) so the runner CONTAINER
#      can reach Gitea / tailnet at runtime. This role deploys no
#      Tailscale sidecar and never calls the Gitea API itself (the
#      registration token is injected — see gitea_runner_token).
#   4. A writable data directory for runner state (default below).
#
# Anything host-specific (paths, OS package management, kernel quirks) is
# the caller's concern, injected via the variables below — never hardcoded
# in this role.
#
# THIS FILE IS THE SINGLE SOURCE OF TRUTH for gitea_runner default
# VALUES. meta/main.yml documents type/usage only — Ansible arg-spec
# default keys are doc-only (never applied at runtime), so restating a
# value there would just drift. Do not duplicate these literals.

# Where the runner keeps its registration + config + cache. This is a
# FIXED HOST path on GITEA_RUNNER_HOST, never a per-user ~ dir: the role
# runs OVER SSH on the target (become: true) and writes here directly,
# while that SAME host's Docker daemon bind-mounts this path into the
# runner container — so the bytes are coherent on a single machine.
# runner_host_seed provisions the directory on the target before this
# role runs. A ~ path would resolve under the SSH user's home rather than
# this fixed location, so keep it absolute. Override via the
# GITEA_RUNNER_DATA_PATH CI variable (passed to the play as an env var in
# .github/workflows/common-bootstrap.yml).
gitea_runner_data_path: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_DATA_PATH')
     | default('/opt/gitea-runner', true) }}

gitea_runner_config_file_parent: "{{ gitea_runner_data_path }}/conf"
gitea_runner_config_file: "{{ gitea_runner_config_file_parent }}/config.yml"

# Plain (NON-dind) act_runner. dind is gone: job containers are spawned on
# the host's own Docker daemon via the bind-mounted docker socket, which
# removes the entire nested-dind problem class (storage-driver probe,
# zombie subreaping, dind-DNS gap, certs-volume mismatch).
gitea_runner_image: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_IMAGE')
     | default('gitea/act_runner:0.6.1', true) }}

# Display name the runner registers under. Host-neutral default; override
# per host via the GITEA_RUNNER_NAME CI variable if you run more than one.
gitea_runner_name: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_NAME')
     | default('gitea-runner', true) }}

# gitea_runner_token is REQUIRED and injected by the deploy (minted in
# gitea-deploy.yml Play 1 on the NAS, passed via hostvars). This role is
# API-free by design and does NOT call the Gitea API to mint it. No
# api-base-url / validate-certs knobs: there is no API call.
