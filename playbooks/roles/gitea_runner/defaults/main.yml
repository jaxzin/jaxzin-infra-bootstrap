---
# =============================================================================
# gitea_runner role — host contract
# =============================================================================
# This role deploys a Gitea Actions runner as a single, socket-mounted
# container. It makes NO assumptions about the host OS. It is deliberately
# decoupled from the rest of this repo (which targets a Synology DSM NAS):
# the runner can run on any Linux Docker host.
#
# Top-level expectations of the target host (the full contract — and the
# only things this role depends on — are documented in
# docs/runbooks/gitea-runner-host.md):
#
#   1. Linux with a running Docker Engine daemon.
#   2. Reachable over SSH; the deploy connects as a user who is a member
#      of the `docker` group. The runner play runs WITHOUT privilege
#      escalation (become: false) — no sudo on the host is required.
#   3. Tailscale running on the HOST (kernel mode) when tailnet access is
#      required — it is here, because the runner registers with Gitea over
#      the tailnet URL and CI jobs ssh to tailnet hosts. The runner gets
#      tailnet reach from the host; this role deploys no Tailscale sidecar.
#   4. A writable data directory for runner state (default below).
#
# Anything host-specific (paths, OS package management, kernel quirks) is
# the caller's concern, injected via the variables below — never hardcoded
# in this role.

# Where the runner keeps its registration + config + cache. This is a
# FIXED HOST path, never a per-user ~ dir: in the co-located bootstrap
# topology the role runs in the CI container (connection: local) and
# writes here, while the HOST Docker daemon bind-mounts this SAME host
# path into the runner container. The CI job bind-mounts this exact path
# and bootstrap-runner.sh provisions it, so the bytes are coherent across
# both. A ~ path would resolve to the CI container's filesystem, not the
# host's (the classic bind-source-resolution bug). Override via the
# GITEA_RUNNER_DATA_PATH CI variable; if you change it, change the CI
# job's bind-mount in .github/workflows/common-bootstrap.yml to match.
gitea_runner_data_path: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_DATA_PATH')
     | default('/opt/gitea-runner', true) }}

gitea_runner_config_file_parent: "{{ gitea_runner_data_path }}/conf"
gitea_runner_config_file: "{{ gitea_runner_config_file_parent }}/config.yml"

# Plain (NON-dind) act_runner. dind is gone: job containers are spawned on
# the host's own Docker daemon via the bind-mounted docker socket, which
# removes the entire nested-dind problem class (storage-driver probe,
# zombie subreaping, dind-DNS gap, certs-volume mismatch).
gitea_runner_image: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_IMAGE')
     | default('gitea/act_runner:0.2.12', true) }}

# Display name the runner registers under. Host-neutral default; override
# per host via the GITEA_RUNNER_NAME CI variable if you run more than one.
gitea_runner_name: >-
  {{ lookup('ansible.builtin.env', 'GITEA_RUNNER_NAME')
     | default('gitea-runner', true) }}

# The runner host reaches Gitea's admin API to mint its registration token
# over the tailnet (it is a tailnet node — expectation #3), NOT over the
# NAS-loopback gitea_api_base_url, which is meaningless on this host.
# Defaults to the tailnet instance URL. Certs are valid (Tailscale Serve
# terminates TLS), so cert validation stays ON.
gitea_runner_api_base_url: "{{ gitea_instance_url }}"
gitea_runner_api_validate_certs: true
