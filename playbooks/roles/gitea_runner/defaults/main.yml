---

# Container resource limits
gitea_runner_memory_limit: "512m"
gitea_runner_memory_swap: "1024m"


gitea_runner_config_file_parent: "{{ gitea_runner_data_path }}/conf"
gitea_runner_config_file: "{{ gitea_runner_config_file_parent }}/config.yml"

# Inner dind dockerd storage driver. Pinned (not auto-detected) because on
# the Synology DSM kernel dockerd's auto-probe fails overlay2 ("no such
# device") then fuse-overlayfs ("not found") before falling back to btrfs;
# every dockerd (re)start re-runs that fragile probe and a job container
# landing mid-probe crashloops (Gitea fallen-leaf/ansible-runner-image#15).
# btrfs is what the probe empirically settles on and what the Synology
# volume backing the runner's /var/lib/docker supports — pin it so dockerd
# goes straight there instead of cycling through the broken drivers.
gitea_runner_storage_driver: "btrfs"
gitea_runner_dind_daemon_json: "{{ gitea_runner_config_file_parent }}/daemon.json"

# Proxy env shared between the runner container itself (tasks/main.yml `env:`)
# and the runner config that propagates the same env to every job container
# (templates/config.yaml.j2 `runner.envs:`). Single source of truth so the
# two surfaces can't drift.
#
# - 1099: Tailscale userspace HTTP CONNECT proxy listen port
#   (TS_OUTBOUND_HTTP_PROXY_LISTEN); used by HTTP/HTTPS clients that honor
#   *_PROXY env vars.
# - 1055: Tailscale userspace SOCKS5 proxy listen port (TS_SOCKS5_SERVER);
#   used by clients that speak SOCKS5 (e.g. tools driven by ALL_PROXY).
#
# NO_PROXY lists actual container short-names on gitea-net (which embedded
# Docker DNS resolves) plus the LAN domain suffix so LAN hostnames bypass
# the tailnet proxy and egress directly via the host's LAN interface.
# Network names like "gitea-net" are NOT valid here — NO_PROXY matches
# hostnames/IPs, not Docker network identifiers.
gitea_runner_proxy_env:
  HTTPS_PROXY: "http://{{ tailscale_runner_container_name }}:1099"
  HTTP_PROXY:  "http://{{ tailscale_runner_container_name }}:1099"
  ALL_PROXY:   "socks5://{{ tailscale_runner_container_name }}:1055"
  NO_PROXY:    "localhost,127.0.0.1,docker,host.docker.internal,{{ lan_domain_suffix }},tailscale-runner,gitea-db,gitea-runner"

# --- Tailnet ssh path for dind job containers (Gitea #25) ---
# `ssh` does NOT honor *_PROXY, so the proxy env above does not help jobs
# that ssh to tailnet hosts (e.g. obsidian-mcp deploying to gaming.<tailnet>).
# Post-userspace-refactor the job container has no tailnet route AND no
# MagicDNS — gaming.<tailnet> resolves to public junk. Fix: give ssh a
# ProxyCommand through the sidecar's SOCKS5 server, which (being on the
# tailnet) does the MagicDNS resolution AND the routing. The upstream job
# image (docker.gitea.com/runner-images:ubuntu-latest) ships no SOCKS
# client, so we bind-mount a static `socat` + an ssh_config.d snippet into
# every job container via config.yaml.j2 container.options.
#
# socat is fetched (pinned URL + sha256) rather than vendored as a binary
# in git. Both MUST be set by the operator to a trusted static build (it
# runs inside every CI job container) — see
# docs/runbooks/job-container-tailnet-ssh.md. No default URL on purpose:
# guessing a binary download is a supply-chain risk.
gitea_runner_socks_helper_url: "{{ lookup('ansible.builtin.env', 'GITEA_RUNNER_SOCKS_HELPER_URL') | default('', true) }}"
gitea_runner_socks_helper_sha256: "{{ lookup('ansible.builtin.env', 'GITEA_RUNNER_SOCKS_HELPER_SHA256') | default('', true) }}"
gitea_runner_socks_helper_host_path: "{{ gitea_runner_config_file_parent }}/ts-socks5"
gitea_runner_tailnet_ssh_config_host_path: "{{ gitea_runner_config_file_parent }}/10-tailnet-proxy.conf"
