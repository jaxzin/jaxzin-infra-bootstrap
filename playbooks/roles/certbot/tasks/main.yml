---
- name: Create scripts directory
  file:
    path: "{{ certbot_data_path }}/scripts"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create shared certs directory
  file:
    path: "{{ certbot_data_path }}/certs"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create certbot conf directory
  file:
    path: "{{ certbot_data_path }}/conf"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Template dnsimple.ini for certbot
  template:
    src: dnsimple.ini.j2
    dest: "{{ certbot_data_path }}/certs/dnsimple.ini"
    owner: root
    group: root
    mode: '0600'

- name: Create DNSimple environment file
  copy:
    content: |
      #!/bin/bash
      export DNSIMPLE_OAUTH_TOKEN="{{ dnsimple_oauth_token }}"
      export DNSIMPLE_ENDPOINT="{{ dnsimple_endpoint }}"
    dest: "{{ certbot_data_path }}/dnsimple_env.sh"
    owner: root
    group: root
    mode: '0600'
  no_log: true # embeds the DNSimple OAuth token — keep it out of the logs

# The Discord webhook is a credential: it lives in its own 0600 root env-file,
# sourced at runtime by renew-cert.sh, and is NEVER templated into that
# world-readable script. Same secure pattern as gitea_backup's
# b2_credentials.env / gitea_oidc_reconcile.env.
- name: Create secure Discord webhook env file
  template:
    src: discord_webhook.env.j2
    dest: "{{ certbot_data_path }}/discord_webhook.env"
    owner: root
    group: root
    mode: '0600'
  no_log: true # holds the Discord webhook credential

- name: Template the renew-cert script
  template:
    src: renew-cert.sh.j2
    dest: "{{ certbot_data_path }}/scripts/renew-cert.sh"
    owner: root
    group: root
    # 0750: only root runs this (cron + the initial-acquisition command
    # below). It holds no credential anymore, so it need not be world-readable.
    mode: '0750'

- name: Run initial certificate acquisition
  command: "{{ certbot_data_path }}/scripts/renew-cert.sh"
  args:
    creates: "{{ certbot_data_path }}/certs/live/{{ certbot_domain }}/fullchain.pem"
  environment:
    DNSIMPLE_OAUTH_TOKEN: "{{ dnsimple_oauth_token }}"
    DNSIMPLE_ENDPOINT: "{{ dnsimple_endpoint }}"

- name: Schedule daily certificate renewal
  ansible.builtin.import_role:
    name: tafeen.synology.syno_crontab
  vars:
    minute: "0"
    hour: "3"
    user: "root"
    job: "{{ certbot_data_path }}/scripts/renew-cert.sh > /dev/null 2>&1"
