---
# All tasks guarded by tailscale_enabled so the role is a no-op in tests
- name: Create Tailscale state directory
  file:
    path: "{{ tailscale_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: tailscale_enabled | bool

- name: Create Tailscale Serve config directory
  file:
    path: "{{ tailscale_serve_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: tailscale_enabled | bool and tailscale_serve_enabled | bool

- name: Deploy Tailscale Serve configuration
  template:
    src: "{{ tailscale_serve_config_src }}"
    dest: "{{ tailscale_serve_config_dir }}/serve.json"
    owner: root
    group: root
    mode: '0644'
  when: tailscale_enabled | bool and tailscale_serve_enabled | bool

- name: Deploy Tailscale sidecar container
  community.docker.docker_container:
    name: "{{ tailscale_container_name }}"
    image: "{{ tailscale_image }}"
    state: started
    restart_policy: always
    networks:
      - name: "{{ tailscale_network_name }}"
    ports: "{{ tailscale_host_ports | default([], true) }}"
    # Always set 100.100.100.100 so Docker's embedded resolver (127.0.0.11)
    # has MagicDNS as its upstream. When tailscale_accept_dns=false, tailscaled
    # does not write resolv.conf, so 127.0.0.11 stays active and forwards
    # unknown names to 100.100.100.100 (tailnet names resolve; external names
    # SERVFAIL because accept_dns=false skips wiring Cloudflare as upstream).
    # When tailscale_accept_dns=true, tailscaled writes resolv.conf and removes
    # 127.0.0.11; the post-start task below restores it so Docker service names
    # AND tailnet/external names all resolve: Docker names → 127.0.0.11;
    # everything else → 127.0.0.11 → 100.100.100.100 → Cloudflare.
    # (2026-05-25 incident)
    dns_servers: "['100.100.100.100']"
    # Self-healing DNS reconciler. The post-start task fixes resolv.conf ONCE,
    # at deploy time — but tailscaled rewrites resolv.conf and strips 127.0.0.11
    # on EVERY restart (container/daemon/host bounce, tailnet reconnect), which
    # silently breaks gitea-db resolution between deploys (2026-06-05 incident:
    # a ContainerManager restart re-triggered the bug). A Docker healthcheck
    # runs on a fixed interval forever and may have side effects, so it doubles
    # as a reconcile loop: re-prepend 127.0.0.11 whenever it's missing, then
    # report healthy iff it's present. Same in-place write as the post-start
    # task (open+truncate via >, never `sed -i`/rename — EBUSY on the bind
    # mount). gitea's 10×3s DB-retry loop covers the ≤interval repair window.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          grep -q '^nameserver 127.0.0.11' /etc/resolv.conf ||
          { { echo 'nameserver 127.0.0.11'; cat /etc/resolv.conf; } > /tmp/resolv_new &&
          cat /tmp/resolv_new > /etc/resolv.conf; };
          grep -q '^nameserver 127.0.0.11' /etc/resolv.conf
      interval: "{{ tailscale_resolv_heal_interval | default('15s') }}"
      timeout: "{{ tailscale_resolv_heal_timeout | default('10s') }}"
      retries: "{{ tailscale_resolv_heal_retries | default(3) }}"
      start_period: "{{ tailscale_resolv_heal_start_period | default('10s') }}"
    # Kernel-mode Tailscale needs CAP_NET_ADMIN + CAP_SYS_MODULE plus the
    # /dev/net/tun device to bring up its kernel TUN interface. Userspace
    # mode (TS_USERSPACE=true) routes WireGuard packets entirely in user
    # space, so neither the capabilities nor the device node are needed.
    # Granting them anyway over-grants privileges and contradicts the
    # architecture rationale for choosing userspace mode in the first
    # place. Conditional: kernel mode only.
    capabilities: "{{ ['NET_ADMIN', 'SYS_MODULE'] if not (tailscale_userspace_networking | default(false) | bool) else omit }}"
    env:
      TS_HOSTNAME: "{{ tailscale_hostname }}"
      TS_AUTHKEY: "{{ tailscale_authkey }}"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_USERSPACE: "{{ tailscale_userspace_networking | default(false) | string | lower }}"
      TS_ACCEPT_DNS: "{{ tailscale_accept_dns | default(true) | string | lower }}"
      TS_SERVE_CONFIG: "{{ '/etc/tailscale/serve.json' if (tailscale_serve_enabled | bool) else omit }}"
      TS_EXTRA_ARGS: "{{ tailscale_extra_args | default(omit, true) }}"
      # In userspace networking mode, expose SOCKS5 (1055) and HTTP CONNECT
      # (1099) proxies so peer containers on the same Docker network can
      # route outbound tailnet traffic through this sidecar without sharing
      # its network namespace. See https://tailscale.com/kb/1112/userspace-networking
      TS_SOCKS5_SERVER: "{{ ':1055' if (tailscale_userspace_networking | default(false) | bool) else omit }}"
      TS_OUTBOUND_HTTP_PROXY_LISTEN: "{{ ':1099' if (tailscale_userspace_networking | default(false) | bool) else omit }}"
    # /dev/net/tun is bind-mounted only in kernel mode (see capabilities
    # comment above). Userspace mode never opens the device.
    volumes: >-
      {{
        [tailscale_state_dir + ':/var/lib/tailscale']
        + (['/dev/net/tun:/dev/net/tun']
           if not (tailscale_userspace_networking | default(false) | bool) else [])
        + ([tailscale_serve_config_dir + ':/etc/tailscale:ro']
           if (tailscale_serve_enabled | bool) else [])
      }}
  when: tailscale_enabled | bool

- name: Wait for Tailscale to reach Running state
  community.docker.docker_container_exec:
    container: "{{ tailscale_container_name }}"
    command: tailscale status --json
  register: ts_status
  until: >
    ts_status.rc is defined and ts_status.rc == 0 and
    (ts_status.stdout | from_json).BackendState == "Running"
  retries: 30
  delay: 2
  changed_when: false
  # Do NOT hard-fail on the until timeout: the assertions below turn a
  # dead/expired TS_AUTHKEY or a "registered but not routing" sidecar into
  # a named, actionable error instead of an opaque retry exhaustion.
  failed_when: false
  when: tailscale_enabled | bool and not ansible_check_mode

- name: Parse final Tailscale status
  set_fact:
    ts_state: >-
      {{ (ts_status.stdout | from_json)
         if (ts_status.stdout is defined and (ts_status.stdout | length) > 0)
         else {} }}
  when: tailscale_enabled | bool and not ansible_check_mode

- name: Fail fast with an actionable message when the auth key is expired or revoked
  fail:
    msg: >-
      Tailscale sidecar '{{ tailscale_container_name }}' did not authenticate
      (BackendState={{ ts_state.BackendState | default('unknown') }}). This is
      the classic expired/revoked TS_AUTHKEY signature. Rotate the key in the
      Tailscale admin console and update the TS_AUTHKEY CI secret on BOTH the
      GitHub repo and the Gitea mirror — see
      docs/runbooks/tailscale-authkey-rotation.md. Persistent sidecars require
      a reusable, NON-ephemeral key.
  when: >
    tailscale_enabled | bool and not ansible_check_mode and
    ts_state.BackendState | default('') in ['NeedsLogin', 'NoState', 'NeedsMachineAuth']

- name: Assert the sidecar is Running AND has a usable tailnet route
  assert:
    that:
      - ts_state.BackendState | default('') == 'Running'
      - ts_state.Self.Online | default(false) | bool
      - (ts_state.Peer | default({}) | length) > 0
    fail_msg: >-
      Tailscale sidecar '{{ tailscale_container_name }}' is
      BackendState={{ ts_state.BackendState | default('unknown') }},
      Self.Online={{ ts_state.Self.Online | default('?') }},
      peers={{ ts_state.Peer | default({}) | length }} — registered but NOT
      routing. Jobs proxying through this sidecar would fail with
      ENETUNREACH. If BackendState is not Running the TS_AUTHKEY is likely
      expired/revoked — see docs/runbooks/tailscale-authkey-rotation.md
      (Gitea issue #25).
    success_msg: >-
      Tailscale sidecar '{{ tailscale_container_name }}' is Running with a
      usable tailnet route ({{ ts_state.Peer | default({}) | length }} peers).
  when: tailscale_enabled | bool and not ansible_check_mode

- name: Restore Docker embedded DNS resolver in Tailscale sidecar resolv.conf
  # tailscaled (TS_ACCEPT_DNS=true) writes resolv.conf and removes Docker's
  # embedded resolver (127.0.0.11). Without it, containers sharing this netns
  # (e.g. gitea via network_mode:container:) cannot resolve Docker service
  # names like gitea-db, causing DB-connection failures on every deploy.
  # Prepend 127.0.0.11; its upstream is 100.100.100.100 (wired via dns_servers
  # at container start), which tailscaled connects to Cloudflare — so the full
  # chain works: Docker names → 127.0.0.11; tailnet/external names →
  # 127.0.0.11 → 100.100.100.100 → Cloudflare. (2026-05-25 incident)
  # IMPORTANT: must NOT use `sed -i` — Docker bind-mounts resolv.conf at
  # the file inode level; sed -i calls rename() which fails with EBUSY on
  # bind-mount targets. Stage through /tmp then overwrite in-place with `>`
  # (open+truncate, no rename). Idempotent: no-op if 127.0.0.11 already present.
  community.docker.docker_container_exec:
    container: "{{ tailscale_container_name }}"
    command: >-
      sh -c "grep -q '^nameserver 127.0.0.11' /etc/resolv.conf ||
             { { echo 'nameserver 127.0.0.11'; cat /etc/resolv.conf; } > /tmp/resolv_new &&
             cat /tmp/resolv_new > /etc/resolv.conf; }"
  changed_when: false
  when: >
    tailscale_enabled | bool and not ansible_check_mode and
    (tailscale_accept_dns | default(true) | bool)
