---
- name: Deploy Gitea, Runner, and Certbot
  hosts: nas
  become: true
  vars_files:
    - vars/main.yml

  # docker-py's default 60s API client timeout is too tight for this host's
  # container-replace operations. The slow path is removing a container that
  # holds `network_mode: container:<X>` against an X we just replaced: Docker
  # serializes netns detach + bridge endpoint removal + volume releases, and
  # on Synology's older Docker 24.x that chain regularly exceeds 60s. When
  # it does, Ansible fails with: "Error removing container ...:
  # UnixHTTPConnectionPool... Read timed out. (read timeout=60)". 180s gives
  # roomy headroom without making genuinely hung calls wait indefinitely.
  module_defaults:
    community.docker.docker_container:
      timeout: 180

  roles:
    - role: tafeen.synology.syno_pkg_install
      syno_pkg_name: "Container Manager"
      syno_pkg_state: present
      tags: docker
  tasks:
    - name: Debug all environment variables
      debug:
        var: ansible_env
    - name: Validate required variables
      assert:
        that:
          - lookup('vars', item) is defined
          - lookup('vars', item) | string != ""
        fail_msg: "The required variable '{{ item }}' is undefined or is empty."
      loop:
        - certbot_email
        - discord_webhook
        - dnsimple_endpoint
        - dnsimple_oauth_token
        - gitea_admin_username
        - gitea_admin_password
        - gitea_admin_email
        - gitea_db_password
        - tailscale_tailnet
        - lan_domain
        - lan_domain_suffix
        - gitea_lan_host

    - name: Validate Tailscale auth key
      assert:
        that:
          - tailscale_authkey is defined
          - tailscale_authkey | string != ""
        fail_msg: "TS_AUTHKEY is required when tailscale_enabled is true."
      when: tailscale_enabled | default(false) | bool

    - name: Install Python3
      include_role:
        name: tafeen.synology.syno_pkg_install
      vars:
        syno_pkg_name: "Python3"
        syno_pkg_state: present

    - name: Install pip
      command: python3 -m ensurepip --upgrade
      args:
        creates: /usr/bin/pip3

    - name: Include certbot role
      include_role:
        name: certbot

    - name: Deploy Tailscale sidecar for Gitea
      include_role:
        name: tailscale_sidecar
      vars:
        tailscale_container_name: "{{ tailscale_gitea_container_name }}"
        tailscale_hostname: "{{ tailscale_gitea_hostname }}"
        tailscale_state_dir: "{{ tailscale_gitea_state_dir }}"
        tailscale_serve_enabled: true
        tailscale_serve_config_src: "ts-serve-gitea.json.j2"
        tailscale_serve_config_dir: "{{ tailscale_gitea_serve_config_dir }}"
        tailscale_serve_domain: "{{ gitea_domain }}"
        tailscale_serve_proxy_port: "3000"
        tailscale_accept_dns: false
        tailscale_serve_ssh_enabled: true
        tailscale_serve_ssh_forward_host: "127.0.0.1"
        tailscale_serve_ssh_forward_port: "{{ gitea_ssh_listen_port }}"
        tailscale_host_ports:
          - "127.0.0.1:{{ gitea_port }}:3000"
          # Container-side port is Gitea's actual SSH listener
          # (gitea_ssh_listen_port = 2222), NOT :22. Inside the shared netns,
          # :22 is bound by Tailscale Serve on the tailnet IP only (for the
          # tailnet-side ssh://git@gitea.<tailnet>:22/... flow). LAN traffic
          # arriving on :22 finds no matching listener and gets RST. Gitea
          # itself listens on :::2222 (app.ini SSH_LISTEN_PORT). Same variable
          # as line 76's tailscale_serve_ssh_forward_port keeps both paths
          # consistent.
          - "{{ gitea_lan_host }}:{{ gitea_lan_ssh_port }}:{{ gitea_ssh_listen_port }}"

    - name: Include gitea_server role
      include_role:
        name: gitea_server

    - name: Detect if running in Gitea
      set_fact:
        in_gitea: "{{ lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true' }}"

    - name: Deploy Tailscale sidecar for Runner
      include_role:
        name: tailscale_sidecar
      vars:
        tailscale_container_name: "{{ tailscale_runner_container_name }}"
        tailscale_hostname: "{{ tailscale_runner_hostname }}"
        tailscale_state_dir: "{{ tailscale_runner_state_dir }}"
        tailscale_serve_enabled: false
        tailscale_host_ports: []
        # The runner sidecar runs in userspace networking mode so peer
        # containers on gitea-net (gitea-runner + its dind-spawned job
        # containers) can route outbound tailnet traffic through the
        # sidecar's SOCKS5/HTTP proxy without sharing its network
        # namespace. Sharing the namespace (the old `network_mode:
        # container:tailscale-runner` pattern) prevented job containers
        # from reaching the LAN, because the sidecar's namespace only had
        # tailnet interfaces. The Gitea sidecar stays in kernel mode
        # because Tailscale Serve (HTTPS termination) requires the kernel
        # TUN device.
        tailscale_userspace_networking: true
      when: not in_gitea

    # Capture the runner sidecar's gitea-net IP so we can inject it as an
    # /etc/hosts entry into every job container the embedded dind dockerd
    # spawns inside gitea-runner. The dind dockerd creates its own internal
    # bridge networks for job containers; those networks don't share
    # gitea-net's embedded DNS, so "tailscale-runner" is unresolvable from
    # inside a job container. Workflows that hit the userspace HTTP/SOCKS5
    # proxy (http://tailscale-runner:1099, socks5://tailscale-runner:1055)
    # would fail to even resolve the hostname.
    #
    # Quick fix: read the sidecar's bridge IP at deploy time and bake it into
    # `container.options` (--add-host) in the runner config. Brittle if the
    # sidecar restarts and Docker hands it a different IP from its DHCP pool;
    # re-running this playbook re-captures the IP and reconciles. Acceptable
    # for the current single-runner scale.
    #
    # Permanent fix (future): drop dind entirely and mount the host
    # /var/run/docker.sock into the runner instead. Job containers would
    # then live on gitea-net directly and inherit its embedded DNS. That
    # breaks the runner's isolation guarantees, so it's a deliberate
    # trade-off, not a free improvement. See
    # docs/architecture/tailscale-sidecar-modes.md.
    - name: Inspect Tailscale runner sidecar for gitea-net IP
      community.docker.docker_container_info:
        name: "{{ tailscale_runner_container_name }}"
      register: tailscale_runner_container_info
      when: not in_gitea

    - name: Set tailscale-runner gitea-net IP fact
      set_fact:
        tailscale_runner_gitea_net_ip: >-
          {{ tailscale_runner_container_info.container.NetworkSettings.Networks[gitea_network_name].IPAddress }}
      when: not in_gitea

    # only install the Gitea runner if bootstrapping the server from GitHub
    - name: Include gitea_runner role
      include_role:
        name: gitea_runner
      when: not in_gitea

    - name: Configure Gitea Backups
      # NOTE: This is a static import, not an include.
      # It runs before the playbook starts regardless of the order
      # TODO: Refactor to either an include_role or move this to the roles section to prevent confusion.
      import_role:
        name: gitea_backup
      become: true
      vars:
        # Backup configuration variables
        b2_bucket_name: "{{ lookup('ansible.builtin.env', 'B2_BUCKET_NAME') }}"
        b2_application_key_id: "{{ lookup('ansible.builtin.env', 'B2_APPLICATION_KEY_ID') }}"
        b2_application_key: "{{ lookup('ansible.builtin.env', 'B2_APPLICATION_KEY') }}"
      tags:
        - backup_config
