---
- name: Deploy Gitea, Runner, and Certbot
  hosts: nas
  become: true
  vars_files:
    - vars/main.yml

  # docker-py's default 60s API client timeout is too tight for this host's
  # container-replace operations. The slow path is removing a container that
  # holds `network_mode: container:<X>` against an X we just replaced: Docker
  # serializes netns detach + bridge endpoint removal + volume releases, and
  # on Synology's older Docker 24.x that chain regularly exceeds 60s. When
  # it does, Ansible fails with: "Error removing container ...:
  # UnixHTTPConnectionPool... Read timed out. (read timeout=60)". 180s gives
  # roomy headroom without making genuinely hung calls wait indefinitely.
  module_defaults:
    community.docker.docker_container:
      timeout: 180

  roles:
    - role: tafeen.synology.syno_pkg_install
      syno_pkg_name: "Container Manager"
      syno_pkg_state: present
      tags: docker
  tasks:
    - name: Debug all environment variables
      debug:
        var: ansible_env
    - name: Validate required variables
      assert:
        that:
          - lookup('vars', item) is defined
          - lookup('vars', item) | string != ""
        fail_msg: "The required variable '{{ item }}' is undefined or is empty."
      loop:
        - certbot_email
        - discord_webhook
        - dnsimple_endpoint
        - dnsimple_oauth_token
        - gitea_admin_username
        - gitea_admin_password
        - gitea_admin_email
        - gitea_db_password
        - tailscale_tailnet
        - lan_domain
        - lan_domain_suffix
        - gitea_lan_host

    - name: Validate Tailscale auth key
      assert:
        that:
          - tailscale_authkey is defined
          - tailscale_authkey | string != ""
        fail_msg: "TS_AUTHKEY is required when tailscale_enabled is true."
      when: tailscale_enabled | default(false) | bool

    - name: Install Python3
      include_role:
        name: tafeen.synology.syno_pkg_install
      vars:
        syno_pkg_name: "Python3"
        syno_pkg_state: present

    - name: Install pip
      command: python3 -m ensurepip --upgrade
      args:
        creates: /usr/bin/pip3

    - name: Include certbot role
      include_role:
        name: certbot

    - name: Deploy Tailscale sidecar for Gitea
      include_role:
        name: tailscale_sidecar
      vars:
        tailscale_container_name: "{{ tailscale_gitea_container_name }}"
        tailscale_hostname: "{{ tailscale_gitea_hostname }}"
        tailscale_state_dir: "{{ tailscale_gitea_state_dir }}"
        tailscale_serve_enabled: true
        # Absolute path so any role's template lookup resolves it regardless
        # of the role's own templates/ search path (Task 2 swaps this include
        # to the jaxzin.infra collection role, whose templates/ dir does not
        # carry this bootstrap-specific Serve config).
        tailscale_serve_config_src: "{{ playbook_dir }}/templates/ts-serve-gitea.json.j2"
        tailscale_serve_config_dir: "{{ tailscale_gitea_serve_config_dir }}"
        tailscale_serve_domain: "{{ gitea_domain }}"
        tailscale_serve_proxy_port: "3000"
        # true: tailscaled applies the tailnet's global nameservers (Cloudflare
        # 1.1.1.1 via "Override DNS servers" in the admin console) as upstream
        # forwarders for 100.100.100.100. This gives the container all three:
        # tailnet names (MagicDNS direct), external names (Cloudflare upstream),
        # and lan.jaxzin.com (Split DNS → 192.168.10.1). false would opt out of
        # the upstream config, leaving 100.100.100.100 with no forwarder and
        # SERVFAILing on external names — which silently blocks Let's Encrypt
        # ACME cert renewal (2026-05-25 incident).
        tailscale_accept_dns: true
        tailscale_serve_ssh_enabled: true
        tailscale_serve_ssh_forward_host: "127.0.0.1"
        tailscale_serve_ssh_forward_port: "{{ gitea_ssh_listen_port }}"
        tailscale_host_ports:
          - "127.0.0.1:{{ gitea_port }}:3000"
          # Container-side port is Gitea's actual SSH listener
          # (gitea_ssh_listen_port = 2222), NOT :22. Inside the shared netns,
          # :22 is bound by Tailscale Serve on the tailnet IP only (for the
          # tailnet-side ssh://git@gitea.<tailnet>:22/... flow). LAN traffic
          # arriving on :22 finds no matching listener and gets RST. Gitea
          # itself listens on :::2222 (app.ini SSH_LISTEN_PORT). Same variable
          # as line 76's tailscale_serve_ssh_forward_port keeps both paths
          # consistent.
          - "{{ gitea_lan_host }}:{{ gitea_lan_ssh_port }}:{{ gitea_ssh_listen_port }}"

    - name: Include gitea_server role
      include_role:
        name: gitea_server

    # Mint the Gitea Actions runner registration token HERE, on the NAS,
    # where the loopback admin API (gitea_api_base_url = 127.0.0.1) is
    # reachable and gitea_api_token is a fact from gitea_server. Play 2
    # runs in the CI job container via connection:local and CANNOT reach
    # the Gitea API (HTTP is loopback-only on the NAS; the tailnet URL is
    # unresolvable from a non-tailnet container), so it must not call the
    # API itself — it consumes this token via hostvars (same cross-play
    # pattern as gitea_api_token). Gated to the GitHub bootstrap path.
    - name: Mint Gitea runner registration token (NAS loopback admin API)
      uri:
        url: "{{ gitea_api_base_url }}/api/v1/admin/runners/registration-token"
        method: GET
        headers:
          Authorization: "token {{ gitea_api_token }}"
        validate_certs: no
      register: runner_reg_token_result
      when: not (lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true')

    - name: Expose the runner registration token to Play 2
      set_fact:
        gitea_runner_registration_token: "{{ runner_reg_token_result.json.token }}"
      when: not (lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true')

    # Capture Gitea's TAILNET IP from its sidecar so Play 2 can pin
    # gitea.<tailnet> -> this IP in the runner container's /etc/hosts. This
    # makes the runner reach Gitea without depending on the runner host
    # running MagicDNS (the host joins with --accept-dns=false to protect
    # its own LAN resolution — see runner_host_seed_accept_dns). failed_when
    # false: if the IP can't be read the runner falls back to host MagicDNS.
    - name: Capture the Gitea sidecar tailnet IP (for the runner /etc/hosts pin)
      ansible.builtin.command:
        cmd: "docker exec {{ tailscale_gitea_container_name }} tailscale ip -4"
      register: gitea_tailnet_ip_result
      changed_when: false
      failed_when: false
      when: not (lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true')

    - name: Expose the Gitea tailnet IP to Play 2
      set_fact:
        gitea_runner_gitea_tailnet_ip: "{{ gitea_tailnet_ip_result.stdout | trim }}"
      when:
        - not (lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true')
        - gitea_tailnet_ip_result.stdout | default('') | trim | length > 0

    - name: Configure Gitea Backups
      # NOTE: This is a static import, not an include.
      # It runs before the playbook starts regardless of the order
      # TODO: Refactor to either an include_role or move this to the roles section to prevent confusion.
      import_role:
        name: gitea_backup
      become: true
      vars:
        # Backup configuration variables
        b2_bucket_name: "{{ lookup('ansible.builtin.env', 'B2_BUCKET_NAME') }}"
        b2_application_key_id: "{{ lookup('ansible.builtin.env', 'B2_APPLICATION_KEY_ID') }}"
        b2_application_key: "{{ lookup('ansible.builtin.env', 'B2_APPLICATION_KEY') }}"
        # OpenBao token file for the OIDC-source self-heal (optional/graceful:
        # if GITEA_OIDC_RECONCILE_BAO_TOKEN is unset the env file is skipped).
        gitea_oidc_reconcile_bao_addr: "{{ lookup('ansible.builtin.env', 'OPENBAO_ADDR') }}"
        gitea_oidc_reconcile_bao_token: "{{ lookup('ansible.builtin.env', 'GITEA_OIDC_RECONCILE_BAO_TOKEN') }}"
      tags:
        - backup_config

    - name: Self-heal Gitea OAuth2 source after deploy (best-effort, non-blocking)
      # Re-asserts the authentik source so drift can't silently strip
      # admin/ownership (2026-05-19 incident). failed_when:false because
      # Gitea is tier-1 / DR-first — a reconcile failure must NEVER fail the
      # deploy. Skips cleanly until jaxzin-auth installs the reconcile script.
      ansible.builtin.shell: |
        set -euo pipefail
        S="{{ gitea_data_path }}/scripts/reconcile-gitea-oauth2.sh"
        E="{{ gitea_data_path }}/scripts/gitea_oidc_reconcile.env"
        if [ -x "$S" ] && [ -f "$E" ]; then
          set -a; . "$E"; set +a
          "$S"
        else
          echo "OIDC reconcile script/env not present yet — skipping (expected until jaxzin-auth installs it)."
        fi
      args:
        executable: /bin/bash
      become: true
      failed_when: false
      changed_when: false
      tags:
        - backup_config

# ---------------------------------------------------------------------------
# Play 2: Gitea Actions runner — OPPORTUNISTIC, deployed over SSH to a
# remote host selected by the GITEA_RUNNER_HOST variable (fully swappable).
#
# Topology (docs/runbooks/gitea-runner-host.md):
#   * The controller (the home-network GitHub self-hosted runner) connects
#     to GITEA_RUNNER_HOST over SSH. They are DIFFERENT machines.
#   * runner_host_seed installs the prerequisites (Docker + Docker SDK +
#     tailnet authkey join + data dir); gitea_runner is a pure consumer
#     that ASSERTS them and deploys the act_runner container.
#   * The registration token is still minted in Play 1 on the NAS (loopback
#     admin API) and borrowed here via hostvars — the role never calls the
#     Gitea API.
#
# Skipped under GITEA_ACTIONS=true (the github->gitea mirror flow) so a
# Gitea-side job never redeploys its own runner.
# ---------------------------------------------------------------------------
- name: Seed + deploy the Gitea Actions runner (remote SSH)
  hosts: gitea_runner
  become: true
  gather_facts: true # need ansible_architecture for the runner label
  vars_files:
    - vars/main.yml
  vars:
    gitea_runner_token: "{{ hostvars[groups['nas'][0]].gitea_runner_registration_token | default('') }}"
    runner_host_seed_tailscale_authkey: "{{ tailscale_authkey | default('') }}"
    # Gitea's tailnet IP (captured in Play 1) → pinned in the runner
    # container's /etc/hosts so it resolves gitea.<tailnet> without the host
    # needing MagicDNS. Empty falls back to host DNS.
    gitea_runner_gitea_tailnet_ip: "{{ hostvars[groups['nas'][0]].gitea_runner_gitea_tailnet_ip | default('') }}"
    in_gitea: "{{ lookup('ansible.builtin.env', 'GITEA_ACTIONS', default='') == 'true' }}"

  tasks:
    - name: Seed the runner host (Docker + SDK + tailnet + data dir)
      include_role:
        name: runner_host_seed
      when: not in_gitea

    - name: Deploy the Gitea runner (bootstrap-from-GitHub only)
      include_role:
        name: gitea_runner
      when: not in_gitea
