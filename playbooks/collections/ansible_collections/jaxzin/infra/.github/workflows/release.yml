---
# Automated releases via semantic-release.
#
# On every push to main, analyzes Conventional Commits since the last tag and,
# if a release is warranted, bumps galaxy.yml, updates CHANGELOG.md, builds and
# publishes the collection to Ansible Galaxy, creates the git tag + GitHub
# Release, and commits the bump back to main with [skip ci] (so the resulting
# push does not re-trigger this workflow).
#
# workflow_dispatch runs a dry-run by default: it computes the next version and
# validates the whole pipeline without tagging, publishing, or committing — safe
# to run before GALAXY_API_KEY is configured.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (compute next version only; no tag/publish/commit)"
        type: boolean
        default: true

permissions:
  contents: write        # push the release tag + version-bump commit
  issues: write          # semantic-release success comments
  pull-requests: write   # semantic-release success comments

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history (semantic-release needs all tags)
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Ansible (for collection build + publish)
        run: |
          uv venv --python 3.12
          uv pip install ansible==14.0.0
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: npx semantic-release ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
