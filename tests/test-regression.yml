---
# tests/test-regression.yml
#
# Regression test suite for Tailscale sidecar integration.
# Run with: ansible-playbook tests/test-regression.yml
# Requires: No Docker, no NAS, no secrets.
#
- name: Regression Tests
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/.."
    roles_dir: "{{ project_root }}/playbooks/roles"
    templates_dir: "{{ project_root }}/playbooks/templates"
    # Test-only variables for template rendering (no real domains)
    test_tailnet: "test-tailnet.ts.net"
    test_gitea_domain: "gitea.test-tailnet.ts.net"
    test_gitea_protocol: "http"
    test_gitea_port: "8443"
    test_gitea_ssh_port: "22"
    test_gitea_root_url: "https://gitea.test-tailnet.ts.net/"
    test_gitea_ssh_domain: "gitea.test-tailnet.ts.net"
    test_serve_domain: "gitea.test-tailnet.ts.net"
    test_serve_proxy_port: "3000"

  tasks:
    # ================================================================
    # Check 1: Docker task structural validation (Gaps 1, 2, 4)
    # ================================================================
    - name: "CHECK 1: Run Docker task structural validator"
      command: python3 {{ project_root }}/tests/check_docker_tasks.py
      args:
        chdir: "{{ project_root }}"
      changed_when: false

    # ================================================================
    # Check 2: No hardcoded /volume1/ paths in roles (Gap 3)
    # ================================================================
    - name: "CHECK 2: Scan role tasks for hardcoded /volume1/ paths"
      shell: >
        grep -rn '/volume1/' {{ roles_dir }}/*/tasks/ {{ roles_dir }}/*/templates/
        || true
      register: hardcoded_paths_roles
      changed_when: false

    - name: "CHECK 2: Assert no hardcoded paths in roles"
      assert:
        that:
          - hardcoded_paths_roles.stdout == ""
        fail_msg: >
          Found hardcoded /volume1/ paths in role files (use {{ '{{' }} gitea_data_path {{ '}}' }} instead):
          {{ hardcoded_paths_roles.stdout }}

    - name: "CHECK 2: Scan playbooks for hardcoded /volume1/ paths (excluding vars)"
      shell: >
        grep -rn '/volume1/' {{ project_root }}/playbooks/*.yml
        || true
      register: hardcoded_paths_playbooks
      changed_when: false

    - name: "CHECK 2: Assert no hardcoded paths in playbooks (excluding vars/main.yml)"
      assert:
        that:
          - hardcoded_paths_playbooks.stdout == ""
        fail_msg: >
          Found hardcoded /volume1/ paths in playbook files:
          {{ hardcoded_paths_playbooks.stdout }}

    # ================================================================
    # Check 3: app.ini.j2 renders correctly with Tailscale vars (Gap 5)
    # ================================================================
    - name: "CHECK 3: Render app.ini.j2 with Tailscale test variables"
      template:
        src: "{{ templates_dir }}/app.ini.j2"
        dest: "/tmp/test-app-ini-rendered"
      vars:
        gitea_protocol: "{{ test_gitea_protocol }}"
        gitea_domain: "{{ test_gitea_domain }}"
        gitea_root_url: "{{ test_gitea_root_url }}"
        gitea_port: "{{ test_gitea_port }}"
        gitea_ssh_port: "{{ test_gitea_ssh_port }}"
        gitea_ssh_domain: "{{ test_gitea_ssh_domain }}"
        gitea_db_name: "test_db"
        gitea_db_user: "test_user"
        gitea_db_password: "test_pass"
        gitea_jwt_secret: "test_jwt_secret_value"

    - name: "CHECK 3: Read rendered app.ini"
      slurp:
        src: /tmp/test-app-ini-rendered
      register: rendered_ini

    - name: "CHECK 3: Decode rendered app.ini"
      set_fact:
        ini_content: "{{ rendered_ini.content | b64decode }}"

    - name: "CHECK 3: Assert app.ini PROTOCOL is http"
      assert:
        that:
          - "'PROTOCOL = http' in ini_content"
        fail_msg: "app.ini should have PROTOCOL = http when Tailscale handles TLS, got: {{ ini_content }}"

    - name: "CHECK 3: Assert app.ini ROOT_URL uses tailnet domain"
      assert:
        that:
          - "'https://gitea.test-tailnet.ts.net/' in ini_content"
        fail_msg: "app.ini ROOT_URL should use the tailnet domain"

    - name: "CHECK 3: Assert app.ini has no CERT_FILE in http mode"
      assert:
        that:
          - "'CERT_FILE' not in ini_content"
        fail_msg: "app.ini should not have CERT_FILE when PROTOCOL = http"

    - name: "CHECK 3: Assert app.ini has no KEY_FILE in http mode"
      assert:
        that:
          - "'KEY_FILE' not in ini_content"
        fail_msg: "app.ini should not have KEY_FILE when PROTOCOL = http"

    - name: "CHECK 3: Assert app.ini SSH_DOMAIN uses tailnet"
      assert:
        that:
          - "'SSH_DOMAIN = gitea.test-tailnet.ts.net' in ini_content"
        fail_msg: "app.ini SSH_DOMAIN should use the tailnet domain"

    # ================================================================
    # Check 4: ts-serve-gitea.json.j2 renders correctly (Gap 5)
    # ================================================================
    - name: "CHECK 4: Render ts-serve-gitea.json.j2"
      template:
        src: "{{ roles_dir }}/tailscale_sidecar/templates/ts-serve-gitea.json.j2"
        dest: "/tmp/test-ts-serve-rendered.json"
      vars:
        tailscale_serve_domain: "{{ test_serve_domain }}"
        tailscale_serve_proxy_port: "{{ test_serve_proxy_port }}"

    - name: "CHECK 4: Read rendered ts-serve config"
      slurp:
        src: /tmp/test-ts-serve-rendered.json
      register: rendered_serve

    - name: "CHECK 4: Decode ts-serve config"
      set_fact:
        serve_content: "{{ rendered_serve.content | b64decode }}"

    - name: "CHECK 4: Assert ts-serve config is valid JSON"
      set_fact:
        serve_json: "{{ serve_content | from_json }}"

    - name: "CHECK 4: Assert ts-serve proxies to correct port"
      assert:
        that:
          - "'http://127.0.0.1:3000' in serve_content"
        fail_msg: "ts-serve config should proxy to http://127.0.0.1:3000"

    - name: "CHECK 4: Assert ts-serve uses tailnet domain"
      assert:
        that:
          - "'gitea.test-tailnet.ts.net' in serve_content"
        fail_msg: "ts-serve config should reference the tailnet domain"

    # ================================================================
    # Check 6: tailscale_sidecar role correctly gates userspace env vars
    # ================================================================
    # Static grep over tasks/main.yml — guarantees that the userspace-mode
    # SOCKS5/HTTP proxy listeners are wired with the documented port
    # numbers and gated on tailscale_userspace_networking. Catches a
    # naive refactor that drops the gating or changes a port silently.
    - name: "CHECK 6: Read tailscale_sidecar tasks/main.yml"
      slurp:
        src: "{{ roles_dir }}/tailscale_sidecar/tasks/main.yml"
      register: tailscale_sidecar_tasks_raw

    - name: "CHECK 6: Decode tailscale_sidecar tasks/main.yml"
      set_fact:
        tailscale_sidecar_tasks: "{{ tailscale_sidecar_tasks_raw.content | b64decode }}"

    - name: "CHECK 6: Assert TS_SOCKS5_SERVER is wired to :1055 + userspace gate"
      assert:
        that:
          - "'TS_SOCKS5_SERVER' in tailscale_sidecar_tasks"
          - "':1055' in tailscale_sidecar_tasks"
          - "'tailscale_userspace_networking' in tailscale_sidecar_tasks"
        fail_msg: >
          tailscale_sidecar/tasks/main.yml must wire TS_SOCKS5_SERVER to
          ':1055' and gate it on tailscale_userspace_networking.

    - name: "CHECK 6: Assert TS_OUTBOUND_HTTP_PROXY_LISTEN is wired to :1099"
      assert:
        that:
          - "'TS_OUTBOUND_HTTP_PROXY_LISTEN' in tailscale_sidecar_tasks"
          - "':1099' in tailscale_sidecar_tasks"
        fail_msg: >
          tailscale_sidecar/tasks/main.yml must wire
          TS_OUTBOUND_HTTP_PROXY_LISTEN to ':1099'.

    - name: "CHECK 6: Assert TS_USERSPACE env is wired to the variable"
      assert:
        that:
          - "'TS_USERSPACE' in tailscale_sidecar_tasks"
        fail_msg: >
          tailscale_sidecar/tasks/main.yml must export TS_USERSPACE so
          consumers can opt into userspace mode.

    # ================================================================
    # Check 7: gitea_runner config.yaml.j2 renders host-agnostic +
    #          socket-mount-clean (no NAS/dind/SOCKS fingerprints)
    # ================================================================
    # The runner moved off the NAS to a generic Linux Docker host
    # (socket-mount, host-level Tailscale, no sidecar). The template is
    # now fully static — this end-to-end render asserts the RENDERED
    # artifact carries none of the retired proxy/SOCKS/dind/Synology
    # surface and does carry the new socket-mount shape. Complements
    # check_docker_tasks.py Check H (which greps source) by validating
    # what actually ships. See docs/runbooks/gitea-runner-host.md.
    - name: "CHECK 7: Render gitea_runner config.yaml.j2"
      template:
        src: "{{ roles_dir }}/gitea_runner/templates/config.yaml.j2"
        dest: /tmp/test-gitea-runner-config.yml

    - name: "CHECK 7: Read rendered gitea_runner config"
      slurp:
        src: /tmp/test-gitea-runner-config.yml
      register: rendered_runner_config_raw

    - name: "CHECK 7: Decode rendered gitea_runner config"
      set_fact:
        rendered_runner_config: "{{ rendered_runner_config_raw.content | b64decode }}"

    - name: "CHECK 7: Assert NO retired NAS/dind/SOCKS fingerprints"
      assert:
        that:
          - "'HTTPS_PROXY' not in rendered_runner_config"
          - "'ALL_PROXY' not in rendered_runner_config"
          - "'ts-socks5' not in rendered_runner_config"
          - "'tailscale-runner' not in rendered_runner_config"
          - "'10-tailnet-proxy.conf' not in rendered_runner_config"
          - "'synology_dsm' not in rendered_runner_config"
          - "'daemon.json' not in rendered_runner_config"
        fail_msg: >
          Rendered runner config still carries a retired
          proxy/SOCKS/dind/Synology fingerprint. The runner now runs on a
          generic Linux host via socket-mount. Got:
          {{ rendered_runner_config }}

    - name: "CHECK 7: Assert the socket-mount runner shape is present"
      assert:
        that:
          # privileged is only needed for dind, which is gone.
          - "'privileged: false' in rendered_runner_config"
          - "'self-hosted' in rendered_runner_config"
          - "'ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-latest' in rendered_runner_config"
        fail_msg: >
          Rendered runner config is missing the expected socket-mount
          shape (privileged:false + the standard labels). Got:
          {{ rendered_runner_config }}

    # ================================================================
    # Check 8: co-located / local-connection bootstrap contract
    # ================================================================
    # Locks in the operator-approved design after the Tailscale-SSH
    # approach was dropped: the GitHub self-hosted runner and the Gitea
    # runner are the SAME machine (not the DSM, not a laptop); Play 2
    # connects LOCALLY; the CI job bind-mounts the host docker socket +
    # the fixed data dir; bootstrap-runner.sh carries NO Tailscale-SSH
    # machinery; and the unenforceable same-machine/not-DSM/not-laptop
    # prereq is prominently documented in BOTH the runbook and the README
    # (the user explicitly required the README warning so the GitHub
    # runner is never installed on a Mac "to go fast"). Docs are the only
    # guard for the prereq, so they are asserted here.
    - name: "CHECK 8: Read common-bootstrap workflow"
      slurp:
        src: "{{ project_root }}/.github/workflows/common-bootstrap.yml"
      register: common_bootstrap_raw

    - name: "CHECK 8: Read gitea-deploy playbook"
      slurp:
        src: "{{ project_root }}/playbooks/gitea-deploy.yml"
      register: gitea_deploy_raw

    - name: "CHECK 8: Read gitea_runner role defaults"
      slurp:
        src: "{{ roles_dir }}/gitea_runner/defaults/main.yml"
      register: runner_defaults_raw

    - name: "CHECK 8: Read gitea_runner role tasks"
      slurp:
        src: "{{ roles_dir }}/gitea_runner/tasks/main.yml"
      register: runner_tasks_raw

    - name: "CHECK 8: Read gitea_runner role meta"
      slurp:
        src: "{{ roles_dir }}/gitea_runner/meta/main.yml"
      register: runner_meta_raw

    - name: "CHECK 8: Read bootstrap-runner.sh"
      slurp:
        src: "{{ project_root }}/bootstrap-runner.sh"
      register: bootstrap_runner_raw

    - name: "CHECK 8: Read the runner-host runbook"
      slurp:
        src: "{{ project_root }}/docs/runbooks/gitea-runner-host.md"
      register: runner_runbook_raw

    - name: "CHECK 8: Read the README"
      slurp:
        src: "{{ project_root }}/README.md"
      register: readme_raw

    - name: "CHECK 8: Decode all CHECK 8 sources"
      set_fact:
        common_bootstrap: "{{ common_bootstrap_raw.content | b64decode }}"
        gitea_deploy: "{{ gitea_deploy_raw.content | b64decode }}"
        runner_defaults: "{{ runner_defaults_raw.content | b64decode }}"
        runner_tasks: "{{ runner_tasks_raw.content | b64decode }}"
        runner_meta: "{{ runner_meta_raw.content | b64decode }}"
        bootstrap_runner: "{{ bootstrap_runner_raw.content | b64decode }}"
        runner_runbook: "{{ runner_runbook_raw.content | b64decode }}"
        readme: "{{ readme_raw.content | b64decode }}"

    - name: "CHECK 8: Assert local-connection wiring (no SSH key, no Tailscale SSH)"
      assert:
        that:
          - "'GITEA_RUNNER_SSH_KEY' not in common_bootstrap"
          - "'ansible_ssh_private_key_file' not in common_bootstrap"
          - "'ansible_connection=local' in common_bootstrap"
          - "'/var/run/docker.sock:/var/run/docker.sock' in common_bootstrap"
          - "'/opt/gitea-runner:/opt/gitea-runner' in common_bootstrap"
          - "'connection: local' in gitea_deploy"
        fail_msg: >
          The co-located/local bootstrap wiring regressed:
          common-bootstrap.yml must use `ansible_connection=local` for
          [gitea_runner], bind-mount the host docker socket + the
          /opt/gitea-runner data dir into the CI job, carry no SSH-key
          wiring, and gitea-deploy.yml Play 2 must be `connection: local`.
          See docs/runbooks/gitea-runner-host.md.

    - name: "CHECK 8: Assert fixed host data path (no per-user ~ / ansible_user_dir)"
      assert:
        that:
          - "'/opt/gitea-runner' in runner_defaults"
          - "'ansible_user_dir' not in runner_defaults"
        fail_msg: >
          gitea_runner data path must be a FIXED host path
          (/opt/gitea-runner), never ansible_user_dir/~ — under
          connection:local a ~ path resolves to the CI container FS, not
          the host FS the runner container bind-mounts (the classic
          bind-source bug). See defaults/main.yml comment.

    - name: "CHECK 8: Assert meta arg-spec is doc-only (no default values; single source = defaults/main.yml)"
      assert:
        that:
          # Ansible argument_specs `default:` is documentation-only and is
          # never applied at runtime — restating values here just drifts
          # from defaults/main.yml (the single source of truth). The spec
          # must declare type/required/description only. (The word
          # "default" may appear in description prose, but the literal
          # `default:` KEY must not.)
          - "'default:' not in runner_meta"
        fail_msg: >
          playbooks/roles/gitea_runner/meta/main.yml reintroduced a
          `default:` key. argument_specs defaults are doc-only in Ansible;
          the single source of default VALUES is
          playbooks/roles/gitea_runner/defaults/main.yml. Remove the
          default from meta and document it by pointing to defaults/main.yml.

    - name: "CHECK 8: Assert the registration token is minted in Play 1, not the role"
      assert:
        that:
          # The CI container cannot reach the Gitea API. The role must NOT
          # call the registration-token endpoint or carry an api-base-url
          # knob; gitea-deploy.yml Play 1 mints it on the NAS (loopback)
          # and passes it via hostvars (gitea_runner_registration_token).
          - "'registration-token' not in runner_tasks"
          - "'gitea_runner_api_base_url' not in runner_defaults"
          - "'registration-token' in gitea_deploy"
          - "'gitea_runner_registration_token' in gitea_deploy"
        fail_msg: >
          The runner registration token must be minted by gitea-deploy.yml
          Play 1 on the NAS (working loopback admin API) and passed to
          Play 2 via hostvars — the gitea_runner role must NOT call the
          Gitea API itself (the CI container cannot resolve/reach it; this
          was the root cause of the first co-located deploy failure). See
          docs/runbooks/gitea-runner-host.md.

    - name: "CHECK 8: Assert bootstrap-runner.sh has NO Tailscale-SSH machinery"
      assert:
        that:
          # Contiguous active-command forms (not bare '--ssh', which the
          # explanatory comments legitimately mention).
          - "'tailscale up --ssh' not in bootstrap_runner"
          - "'tailscale set --ssh' not in bootstrap_runner"
          - "'accept-risk' not in bootstrap_runner"
          - "'confirm_ssh_enable' not in bootstrap_runner"
          - "'BOOTSTRAP_RUNNER_ASSUME_YES' not in bootstrap_runner"
          - "'ensure_data_dir' in bootstrap_runner"
          - "'tailscale up' in bootstrap_runner"
        fail_msg: >
          bootstrap-runner.sh must not enable/manage Tailscale SSH
          (no `tailscale up/set --ssh`, no accept-risk, no confirm hatch —
          the connection is local now) and must provision the runner data
          dir (ensure_data_dir) + ensure plain tailnet membership
          (`tailscale up`). See docs/runbooks/gitea-runner-host.md.

    - name: "CHECK 8: Assert the same-machine / not-DSM / not-laptop prereq is documented"
      assert:
        that:
          # Runbook: prominent, unenforceable prereq.
          - "'PREREQUISITES' in runner_runbook"
          # Single-line phrases (the source is hard-wrapped, so multi-word
          # asserts must not straddle a line break).
          - "'GitHub runner host == the Gitea runner host' in runner_runbook"
          - "'Synology DSM' in runner_runbook"
          - "'laptop' in runner_runbook"
          - "'no SSH, no Tailscale SSH, no key' in runner_runbook"
          # README: the user explicitly required the warning here so the
          # GitHub runner is never installed on a Mac to go fast.
          - "'co-located' in readme"
          - "'NOT your laptop' in readme"
          - "'host the Gitea runner' in readme"
        fail_msg: >
          The same-machine / NOT-the-DSM / NOT-a-laptop co-location
          prereq must be prominently documented in BOTH
          docs/runbooks/gitea-runner-host.md and README.md (no script
          enforces it). The README warning is a hard requirement so the
          GitHub runner is never installed on a Mac "to go fast".

    - name: "CHECK 8: Assert bootstrap-runner.sh exists and is executable"
      stat:
        path: "{{ project_root }}/bootstrap-runner.sh"
      register: bootstrap_runner_stat

    - name: "CHECK 8: Assert bootstrap-runner.sh is present + executable"
      assert:
        that:
          - bootstrap_runner_stat.stat.exists
          - bootstrap_runner_stat.stat.executable
        fail_msg: >
          bootstrap-runner.sh (the documented one-time runner-host seed)
          is missing or not executable.

    # ================================================================
    # Check 9: tailscale_sidecar DNS uses public resolvers (not MagicDNS)
    #          when tailscale_accept_dns is false.
    # ================================================================
    # Tailscale's MagicDNS (100.100.100.100) returns SERVFAIL for external
    # names on this Synology setup, silently blocking Let's Encrypt ACME cert
    # renewal. The sidecar's Serve targets 127.0.0.1 (loopback), so it never
    # needs to resolve tailnet names; public resolvers (1.1.1.1, 8.8.8.8)
    # must be used instead. This check guards against regressing to
    # 100.100.100.100 as the only resolver. (2026-05-25 incident)
    - name: "CHECK 9: Assert tailscale_sidecar dns_servers uses public resolvers"
      assert:
        that:
          - "'1.1.1.1' in tailscale_sidecar_tasks"
          - "'100.100.100.100' not in tailscale_sidecar_tasks"
        fail_msg: >
          tailscale_sidecar/tasks/main.yml must use 1.1.1.1 (not
          100.100.100.100) as the dns_servers when tailscale_accept_dns is
          false. Tailscale's MagicDNS returns SERVFAIL for external names,
          breaking Let's Encrypt ACME cert renewal (2026-05-25 incident).

    # ================================================================
    # Cleanup
    # ================================================================
    - name: Clean up rendered test files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/test-app-ini-rendered
        - /tmp/test-ts-serve-rendered.json
        - /tmp/test-gitea-runner-config.yml
