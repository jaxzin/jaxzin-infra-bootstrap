---
# tests/test-regression.yml
#
# Regression test suite for Tailscale sidecar integration.
# Run with: ansible-playbook tests/test-regression.yml
# Requires: No Docker, no NAS, no secrets.
#
- name: Regression Tests
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/.."
    roles_dir: "{{ project_root }}/playbooks/roles"
    templates_dir: "{{ project_root }}/playbooks/templates"
    # Test-only variables for template rendering (no real domains)
    test_tailnet: "test-tailnet.ts.net"
    test_gitea_domain: "gitea.test-tailnet.ts.net"
    test_gitea_protocol: "http"
    test_gitea_port: "8443"
    test_gitea_ssh_port: "22"
    test_gitea_root_url: "https://gitea.test-tailnet.ts.net/"
    test_gitea_ssh_domain: "gitea.test-tailnet.ts.net"
    test_serve_domain: "gitea.test-tailnet.ts.net"
    test_serve_proxy_port: "3000"

  tasks:
    # ================================================================
    # Check 1: Docker task structural validation (Gaps 1, 2, 4)
    # ================================================================
    - name: "CHECK 1: Run Docker task structural validator"
      command: python3 {{ project_root }}/tests/check_docker_tasks.py
      args:
        chdir: "{{ project_root }}"
      changed_when: false

    # ================================================================
    # Check 2: No hardcoded /volume1/ paths in roles (Gap 3)
    # ================================================================
    - name: "CHECK 2: Scan role tasks for hardcoded /volume1/ paths"
      shell: >
        grep -rn '/volume1/' {{ roles_dir }}/*/tasks/ {{ roles_dir }}/*/templates/
        || true
      register: hardcoded_paths_roles
      changed_when: false

    - name: "CHECK 2: Assert no hardcoded paths in roles"
      assert:
        that:
          - hardcoded_paths_roles.stdout == ""
        fail_msg: >
          Found hardcoded /volume1/ paths in role files (use {{ '{{' }} gitea_data_path {{ '}}' }} instead):
          {{ hardcoded_paths_roles.stdout }}

    - name: "CHECK 2: Scan playbooks for hardcoded /volume1/ paths (excluding vars)"
      shell: >
        grep -rn '/volume1/' {{ project_root }}/playbooks/*.yml
        || true
      register: hardcoded_paths_playbooks
      changed_when: false

    - name: "CHECK 2: Assert no hardcoded paths in playbooks (excluding vars/main.yml)"
      assert:
        that:
          - hardcoded_paths_playbooks.stdout == ""
        fail_msg: >
          Found hardcoded /volume1/ paths in playbook files:
          {{ hardcoded_paths_playbooks.stdout }}

    # ================================================================
    # Check 3: app.ini.j2 renders correctly with Tailscale vars (Gap 5)
    # ================================================================
    - name: "CHECK 3: Render app.ini.j2 with Tailscale test variables"
      template:
        src: "{{ templates_dir }}/app.ini.j2"
        dest: "/tmp/test-app-ini-rendered"
      vars:
        gitea_protocol: "{{ test_gitea_protocol }}"
        gitea_domain: "{{ test_gitea_domain }}"
        gitea_root_url: "{{ test_gitea_root_url }}"
        gitea_port: "{{ test_gitea_port }}"
        gitea_ssh_port: "{{ test_gitea_ssh_port }}"
        gitea_ssh_domain: "{{ test_gitea_ssh_domain }}"
        gitea_db_name: "test_db"
        gitea_db_user: "test_user"
        gitea_db_password: "test_pass"
        gitea_jwt_secret: "test_jwt_secret_value"

    - name: "CHECK 3: Read rendered app.ini"
      slurp:
        src: /tmp/test-app-ini-rendered
      register: rendered_ini

    - name: "CHECK 3: Decode rendered app.ini"
      set_fact:
        ini_content: "{{ rendered_ini.content | b64decode }}"

    - name: "CHECK 3: Assert app.ini PROTOCOL is http"
      assert:
        that:
          - "'PROTOCOL = http' in ini_content"
        fail_msg: "app.ini should have PROTOCOL = http when Tailscale handles TLS, got: {{ ini_content }}"

    - name: "CHECK 3: Assert app.ini ROOT_URL uses tailnet domain"
      assert:
        that:
          - "'https://gitea.test-tailnet.ts.net/' in ini_content"
        fail_msg: "app.ini ROOT_URL should use the tailnet domain"

    - name: "CHECK 3: Assert app.ini has no CERT_FILE in http mode"
      assert:
        that:
          - "'CERT_FILE' not in ini_content"
        fail_msg: "app.ini should not have CERT_FILE when PROTOCOL = http"

    - name: "CHECK 3: Assert app.ini has no KEY_FILE in http mode"
      assert:
        that:
          - "'KEY_FILE' not in ini_content"
        fail_msg: "app.ini should not have KEY_FILE when PROTOCOL = http"

    - name: "CHECK 3: Assert app.ini SSH_DOMAIN uses tailnet"
      assert:
        that:
          - "'SSH_DOMAIN = gitea.test-tailnet.ts.net' in ini_content"
        fail_msg: "app.ini SSH_DOMAIN should use the tailnet domain"

    - name: "CHECK 3: Assert app.ini widens the DB connect retry budget"
      # Gitea's defaults (DB_RETRIES=10 x DB_RETRY_BACKOFF=3s ~= 30s) are too
      # short to outlast MySQL's InnoDB crash recovery after an unclean
      # restart, so gitea exits and restart:always crash-loops it. The
      # template must widen this to ~10m (60 x 10s) to match the gitea-db
      # healthcheck start_period and the deploy-time wait gate.
      assert:
        that:
          - "'DB_RETRIES = 60' in ini_content"
          - "'DB_RETRY_BACKOFF = 10s' in ini_content"
        fail_msg: >
          app.ini must set DB_RETRIES=60 and DB_RETRY_BACKOFF=10s (~10m of
          retries) so gitea waits out MySQL InnoDB crash recovery instead of
          crash-looping after an unclean restart. Got: {{ ini_content }}

    # ================================================================
    # Check 4: ts-serve-gitea.json.j2 renders correctly (Gap 5)
    # ================================================================
    - name: "CHECK 4: Render ts-serve-gitea.json.j2"
      template:
        src: "{{ templates_dir }}/ts-serve-gitea.json.j2"
        dest: "/tmp/test-ts-serve-rendered.json"
      vars:
        tailscale_serve_domain: "{{ test_serve_domain }}"
        tailscale_serve_proxy_port: "{{ test_serve_proxy_port }}"

    - name: "CHECK 4: Read rendered ts-serve config"
      slurp:
        src: /tmp/test-ts-serve-rendered.json
      register: rendered_serve

    - name: "CHECK 4: Decode ts-serve config"
      set_fact:
        serve_content: "{{ rendered_serve.content | b64decode }}"

    - name: "CHECK 4: Assert ts-serve config is valid JSON"
      set_fact:
        serve_json: "{{ serve_content | from_json }}"

    - name: "CHECK 4: Assert ts-serve proxies to correct port"
      assert:
        that:
          - "'http://127.0.0.1:3000' in serve_content"
        fail_msg: "ts-serve config should proxy to http://127.0.0.1:3000"

    - name: "CHECK 4: Assert ts-serve uses tailnet domain"
      assert:
        that:
          - "'gitea.test-tailnet.ts.net' in serve_content"
        fail_msg: "ts-serve config should reference the tailnet domain"

    # ================================================================
    # Check 7: gitea_runner config.yaml.j2 renders host-agnostic +
    #          socket-mount-clean (no NAS/dind/SOCKS fingerprints)
    # ================================================================
    # The runner moved off the NAS to a generic Linux Docker host
    # (socket-mount, host-level Tailscale, no sidecar). The template is
    # now fully static — this end-to-end render asserts the RENDERED
    # artifact carries none of the retired proxy/SOCKS/dind/Synology
    # surface and does carry the new socket-mount shape. Complements
    # check_docker_tasks.py Check H (which greps source) by validating
    # what actually ships. See docs/runbooks/gitea-runner-host.md.
    - name: "CHECK 7: Render gitea_runner config.yaml.j2 (arm64 target)"
      template:
        src: "{{ roles_dir }}/gitea_runner/templates/config.yaml.j2"
        dest: /tmp/test-gitea-runner-config.yml
      vars:
        ansible_architecture: aarch64

    - name: "CHECK 7: Read rendered gitea_runner config"
      slurp:
        src: /tmp/test-gitea-runner-config.yml
      register: rendered_runner_config_raw

    - name: "CHECK 7: Decode rendered gitea_runner config"
      set_fact:
        rendered_runner_config: "{{ rendered_runner_config_raw.content | b64decode }}"

    - name: "CHECK 7: Assert NO retired NAS/dind/SOCKS fingerprints"
      assert:
        that:
          - "'HTTPS_PROXY' not in rendered_runner_config"
          - "'ALL_PROXY' not in rendered_runner_config"
          - "'ts-socks5' not in rendered_runner_config"
          - "'tailscale-runner' not in rendered_runner_config"
          - "'10-tailnet-proxy.conf' not in rendered_runner_config"
          - "'synology_dsm' not in rendered_runner_config"
          - "'daemon.json' not in rendered_runner_config"
        fail_msg: >
          Rendered runner config still carries a retired
          proxy/SOCKS/dind/Synology fingerprint. The runner now runs on a
          generic Linux host via socket-mount. Got:
          {{ rendered_runner_config }}

    - name: "CHECK 7: Assert the socket-mount runner shape is present"
      assert:
        that:
          - "'privileged: false' in rendered_runner_config"
          - "'self-hosted' in rendered_runner_config"
          - "'ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-latest' in rendered_runner_config"
          # arch label is derived from the target (aarch64 → arm64 here)
          - "'arm64' in rendered_runner_config"
          - "'\"amd64\"' not in rendered_runner_config"
        fail_msg: >
          Rendered runner config is missing the expected socket-mount
          shape (privileged:false + the standard labels). Got:
          {{ rendered_runner_config }}

    # ================================================================
    # Check 8: opportunistic SSH-based runner contract
    # ================================================================
    # The runner is deployed OVER SSH to GITEA_RUNNER_HOST (a remote host
    # seeded with Docker + tailnet by runner_host_seed). The controller and
    # the target are different machines. bootstrap-runner.sh is retired; the
    # gitea_runner role is a pure consumer (asserts Docker + tailnet). The
    # registration token is still minted in Play 1 and passed via hostvars.
    # See docs/runbooks/gitea-runner-host.md.
    - name: "CHECK 8: Read common-bootstrap workflow"
      slurp:
        src: "{{ project_root }}/.github/workflows/common-bootstrap.yml"
      register: common_bootstrap_raw

    - name: "CHECK 8: Read gitea-deploy playbook"
      slurp:
        src: "{{ project_root }}/playbooks/gitea-deploy.yml"
      register: gitea_deploy_raw

    - name: "CHECK 8: Read gitea_runner role tasks"
      slurp:
        src: "{{ roles_dir }}/gitea_runner/tasks/main.yml"
      register: runner_tasks_raw

    - name: "CHECK 8: Read runner_host_seed role tasks"
      slurp:
        src: "{{ roles_dir }}/runner_host_seed/tasks/main.yml"
      register: seed_tasks_raw

    - name: "CHECK 8: Read the runner-host runbook"
      slurp:
        src: "{{ project_root }}/docs/runbooks/gitea-runner-host.md"
      register: runner_runbook_raw

    - name: "CHECK 8: Read the README"
      slurp:
        src: "{{ project_root }}/README.md"
      register: readme_raw

    - name: "CHECK 8: Decode all CHECK 8 sources"
      set_fact:
        common_bootstrap: "{{ common_bootstrap_raw.content | b64decode }}"
        gitea_deploy: "{{ gitea_deploy_raw.content | b64decode }}"
        runner_tasks: "{{ runner_tasks_raw.content | b64decode }}"
        seed_tasks: "{{ seed_tasks_raw.content | b64decode }}"
        runner_runbook: "{{ runner_runbook_raw.content | b64decode }}"
        readme: "{{ readme_raw.content | b64decode }}"

    - name: "CHECK 8: Assert SSH (not local) deploy wiring"
      assert:
        that:
          - "'GITEA_RUNNER_SSH_KEY' in common_bootstrap"
          - "'ansible_ssh_private_key_file' in common_bootstrap"
          - "'ansible_connection=local' not in common_bootstrap"
          - "'connection: local' not in gitea_deploy"
          # Play 2 (gitea_runner) runs become:true over SSH. The live runner
          # host lacks working passwordless (NOPASSWD) sudo despite the PR #135
          # SD-image bake — Play 2 failed "Missing sudo password" until #143
          # wired in the GITEA_RUNNER_SUDO_PASSWORD secret. Lock that the runner
          # line carries that become password so Play 2 can escalate.
          # FOLLOW-UP: if the host is reimaged with working NOPASSWD, flip this
          # back to a "not in" lock, drop the password, and the runbook's
          # NOPASSWD prereq (asserted below) becomes the enforced reality again.
          - "'GITEA_RUNNER_SUDO_PASSWORD' in common_bootstrap"
        fail_msg: >
          The opportunistic SSH wiring regressed: common-bootstrap.yml must
          install GITEA_RUNNER_SSH_KEY and set ansible_ssh_private_key_file
          for [gitea_runner] (NOT ansible_connection=local), must set the
          GITEA_RUNNER_SUDO_PASSWORD become password (the live runner lacks
          working NOPASSWD sudo — see #143), and gitea-deploy.yml Play 2 must
          NOT be connection: local.

    - name: "CHECK 8: Assert the host is seeded before the runner is deployed"
      assert:
        that:
          - "'runner_host_seed' in gitea_deploy"
          - "'gather_facts: true' in gitea_deploy"
        fail_msg: >
          gitea-deploy.yml Play 2 must include the runner_host_seed role
          (provides Docker + tailnet) and gather_facts (for the arch label).

    - name: "CHECK 8: Assert the seed installs Docker SDK + tailnet, runner asserts them"
      assert:
        that:
          - "'docker==' in seed_tasks"
          - "'tailscale up --authkey' in seed_tasks"
          - "'docker_host_info' in runner_tasks"
          - "'tailscale status' in runner_tasks"
        fail_msg: >
          runner_host_seed must install the Docker SDK and join the tailnet;
          the gitea_runner role must ASSERT Docker (docker_host_info) and
          tailnet (tailscale status) as a pure consumer.

    - name: "CHECK 8: Assert shared-host DNS safety (accept-dns off + Gitea /etc/hosts pin)"
      # A shared runner host (one also running other services) must NOT have
      # its /etc/resolv.conf clobbered by tailscaled. The seed joins with
      # --accept-dns (default false); the runner then reaches Gitea via an
      # explicit etc_hosts pin to Gitea's tailnet IP, which the deploy
      # captures in Play 1. (Otherwise a co-located service's LAN name
      # resolution would break.)
      assert:
        that:
          - "'--accept-dns' in seed_tasks"
          - "'runner_host_seed_accept_dns' in seed_tasks"
          - "'etc_hosts' in runner_tasks"
          - "'gitea_runner_gitea_tailnet_ip' in runner_tasks"
          - "'tailscale ip -4' in gitea_deploy"
          - "'gitea_runner_gitea_tailnet_ip' in gitea_deploy"
        fail_msg: >
          Shared-host DNS safety regressed: runner_host_seed must join with
          --accept-dns (gated by runner_host_seed_accept_dns) so it does not
          rewrite the host resolver, the gitea_runner role must pin Gitea via
          etc_hosts/gitea_runner_gitea_tailnet_ip, and gitea-deploy.yml Play 1
          must capture Gitea's tailnet IP (tailscale ip -4) and pass it on.

    - name: "CHECK 8: Assert the registration token is minted in Play 1, not the role"
      assert:
        that:
          - "'registration-token' not in runner_tasks"
          - "'registration-token' in gitea_deploy"
          - "'gitea_runner_registration_token' in gitea_deploy"
        fail_msg: >
          The runner registration token must be minted by gitea-deploy.yml
          Play 1 on the NAS and passed to Play 2 via hostvars; the role must
          not call the Gitea API.

    - name: "CHECK 8: Assert bootstrap-runner.sh is retired"
      stat:
        path: "{{ project_root }}/bootstrap-runner.sh"
      register: bootstrap_runner_stat

    - name: "CHECK 8: Assert bootstrap-runner.sh no longer exists"
      assert:
        that:
          - not bootstrap_runner_stat.stat.exists
        fail_msg: >
          bootstrap-runner.sh must be removed — host seeding is now done by
          the runner_host_seed role over SSH in the bootstrap CI flow.

    - name: "CHECK 8: Assert the IaC SSH-access seed exists"
      stat:
        path: "{{ project_root }}/playbooks/seed-runner-ssh.yml"
      register: seed_ssh_stat

    - name: "CHECK 8: Assert seed-runner-ssh.yml is present"
      assert:
        that:
          - seed_ssh_stat.stat.exists
        fail_msg: >
          playbooks/seed-runner-ssh.yml (the committed idempotent IaC that
          authorizes the runner public key on the target) must exist.

    - name: "CHECK 8: Assert the target-host contract is documented (SSH + Docker + tailnet, swappable)"
      assert:
        that:
          - "'GITEA_RUNNER_HOST' in runner_runbook"
          - "'SSH' in runner_runbook"
          - "'swappable' in runner_runbook"
          # The runner user runs Play 2's become:true with NO sudo password, so
          # passwordless sudo (NOPASSWD) is a load-bearing, unenforceable host
          # prereq — it MUST stay documented (feeding a become password into a
          # NOPASSWD flow makes Ansible fail "Incorrect sudo password").
          - "'NOPASSWD' in runner_runbook"
          - "'GITEA_RUNNER_HOST' in readme"
        fail_msg: >
          docs/runbooks/gitea-runner-host.md and README.md must document the
          opportunistic target-host contract (reachable over SSH, has Docker,
          joins the tailnet; host is GITEA_RUNNER_HOST and swappable; the
          runner user has passwordless/NOPASSWD sudo).

    # ================================================================
    # Check 9: Gitea sidecar uses tailscale_accept_dns: true so MagicDNS
    #          has Cloudflare as its upstream forwarder for external names.
    # ================================================================
    # With tailscale_accept_dns=false, tailscaled opts out of the tailnet's
    # global nameserver config ("Override DNS servers" → Cloudflare 1.1.1.1),
    # leaving 100.100.100.100 with no upstream forwarder. External names like
    # acme-v02.api.letsencrypt.org then SERVFAIL, silently blocking Let's
    # Encrypt ACME cert renewal for ~30 days until the cert expires. OIDC
    # back-channel calls to auth.<tailnet>.ts.net also require
    # MagicDNS, so we can't simply switch to a public resolver either.
    # The fix: tailscale_accept_dns=true so the container gets all three:
    # tailnet names (MagicDNS), external names (Cloudflare upstream), and
    # lan.jaxzin.com (Split DNS). (2026-05-25 incident)
    - name: "CHECK 9: Read gitea-deploy.yml for tailscale_accept_dns assertion"
      slurp:
        src: "{{ project_root }}/playbooks/gitea-deploy.yml"
      register: gitea_deploy_raw

    - name: "CHECK 9: Decode gitea-deploy.yml"
      set_fact:
        gitea_deploy: "{{ gitea_deploy_raw.content | b64decode }}"

    - name: "CHECK 9: Assert Gitea sidecar has tailscale_accept_dns: true"
      assert:
        that:
          - "'tailscale_accept_dns: true' in gitea_deploy"
          - "'tailscale_accept_dns: false' not in gitea_deploy"
        fail_msg: >
          gitea-deploy.yml must set tailscale_accept_dns: true for the Gitea
          Tailscale sidecar. With false, tailscaled opts out of the tailnet's
          global nameservers, so 100.100.100.100 has no upstream forwarder
          and SERVFAILs on external names — breaking ACME cert renewal and
          potentially OIDC back-channel calls. (2026-05-25 incident)

    # ================================================================
    # Check 10: gitea_backup schedules ONE canonical weekly dump and
    #           reconciles (purges) stale/legacy cron entries (#106)
    # ================================================================
    # tafeen.synology.syno_crontab is `lineinfile state=present` with a
    # literal line and NO regexp — structurally append-only. A schedule
    # change cannot remove the prior entry (verified root cause of the
    # double Monday run). The role MUST purge any existing gitea_dump.sh
    # /etc/crontab line before (re)adding the single canonical schedule:
    # 05:00 America/New_York, Tuesdays.
    - name: "CHECK 10: Read gitea_backup tasks/main.yml"
      slurp:
        src: "{{ roles_dir }}/gitea_backup/tasks/main.yml"
      register: gitea_backup_tasks_raw

    - name: "CHECK 10: Decode gitea_backup tasks"
      set_fact:
        gitea_backup_tasks: "{{ gitea_backup_tasks_raw.content | b64decode }}"

    - name: "CHECK 10: Assert stale cron entries are reconciled before scheduling"
      assert:
        that:
          - "'state: absent' in gitea_backup_tasks"
          - "'/etc/crontab' in gitea_backup_tasks"
          - "'Reconcile: remove any legacy/duplicate Gitea backup cron entries' in gitea_backup_tasks"
          - "'Schedule Gitea dump and B2 upload script' not in gitea_backup_tasks"
        fail_msg: >
          gitea_backup/tasks/main.yml must purge any existing
          gitea_dump.sh line from /etc/crontab (lineinfile state=absent
          keyed on the script path) BEFORE scheduling — the upstream
          syno_crontab role is append-only and cannot reconcile a
          schedule change (root cause of the double Monday run, #106).

    - name: "CHECK 10: Assert exactly one canonical schedule — 05:00 ET Tuesdays"
      assert:
        that:
          - "'05:00 America/New_York, Tuesdays' in gitea_backup_tasks"
          - "'weekday:' in gitea_backup_tasks"
          - "gitea_backup_tasks.count('name: tafeen.synology.syno_crontab') == 1"
        fail_msg: >
          gitea_backup must schedule exactly one weekly dump at
          05:00 America/New_York on Tuesdays (hour 5, weekday 2) via a
          single syno_crontab import, and no longer the old 02:00 (#106).

    # ================================================================
    # Check 11: gitea_dump.sh.j2 never writes B2 credentials to the log
    #           and carries no dead error-handling (#108)
    # ================================================================
    - name: "CHECK 11: Read gitea_dump.sh.j2"
      slurp:
        src: "{{ roles_dir }}/gitea_backup/templates/gitea_dump.sh.j2"
      register: gitea_dump_tpl_raw

    - name: "CHECK 11: Decode gitea_dump.sh.j2"
      set_fact:
        gitea_dump_tpl: "{{ gitea_dump_tpl_raw.content | b64decode }}"

    - name: "CHECK 11: Assert credentials are never logged + log is locked down"
      assert:
        that:
          - "'umask 077' in gitea_dump_tpl"
          - "'chmod 600' in gitea_dump_tpl"
          - "'hardening(#108):' in gitea_dump_tpl"
          - "'(#108) silence' in gitea_dump_tpl"
          - "'DUMP_EXIT_CODE' not in gitea_dump_tpl"
        fail_msg: >
          gitea_dump.sh.j2 must: set `umask 077` and `chmod 600` the log
          so it is not world-readable; suppress the `b2 account authorize`
          output so the application key never reaches the shared log
          (marked `(#108) silence`); and drop the unreachable
          DUMP_EXIT_CODE check (dead under set -euo pipefail) (#108).

    # ================================================================
    # Check 12: the offsite upload does NOT run inside the Gitea
    #           offline window — Gitea is restarted right after the
    #           dump tarball is created, before the upload (#110)
    # ================================================================
    - name: "CHECK 12: Assert Gitea is brought back online before the upload"
      assert:
        that:
          - "'# (#110) Gitea back online here' in gitea_dump_tpl"
          - "'b2 file upload' in gitea_dump_tpl"
          - "gitea_dump_tpl.index('# (#110) Gitea back online here') < gitea_dump_tpl.index('b2 file upload')"
        fail_msg: >
          gitea_dump.sh.j2 must restart the Gitea container immediately
          after the dump tarball is created and BEFORE the offsite
          upload (marker `# (#110) Gitea back online here`), so the
          ~40-min upload no longer runs inside the offline window (#110).

    # ================================================================
    # Check 13: Gitea OIDC source self-heals on restart + deploy,
    #           non-blocking / DR-safe (2026-05-19 silent-drift incident)
    # ================================================================
    - name: "CHECK 13: Read OIDC self-heal sources"
      slurp:
        src: "{{ item }}"
      register: oidc_selfheal_raw
      loop:
        - "{{ roles_dir }}/gitea_backup/tasks/main.yml"
        - "{{ roles_dir }}/gitea_backup/templates/gitea_dump.sh.j2"
        - "{{ roles_dir }}/gitea_backup/templates/gitea_oidc_reconcile.env.j2"
        - "{{ project_root }}/playbooks/gitea-deploy.yml"

    - name: "CHECK 13: Decode sources"
      set_fact:
        oidc_gb_tasks: "{{ oidc_selfheal_raw.results[0].content | b64decode }}"
        oidc_dump_tpl: "{{ oidc_selfheal_raw.results[1].content | b64decode }}"
        oidc_env_tpl: "{{ oidc_selfheal_raw.results[2].content | b64decode }}"
        oidc_deploy: "{{ oidc_selfheal_raw.results[3].content | b64decode }}"

    - name: "CHECK 13: Assert the OIDC reconcile env is provisioned securely"
      assert:
        that:
          - "'gitea_oidc_reconcile.env.j2' in oidc_gb_tasks"
          - "'gitea_oidc_reconcile.env' in oidc_gb_tasks"
          - "'BAO_TOKEN' in oidc_env_tpl"
          - "'TS_TAILNET' in oidc_env_tpl"
        fail_msg: >
          gitea_backup must provision gitea_oidc_reconcile.env (root 0600,
          no_log) from gitea_oidc_reconcile.env.j2 carrying BAO_TOKEN +
          TS_TAILNET, so the on-restart self-heal can authenticate to OpenBao.

    - name: "CHECK 13: Assert restart + deploy self-heal is wired and NON-blocking"
      assert:
        that:
          - "'reconcile-gitea-oauth2.sh' in oidc_dump_tpl"
          - "'gitea_oidc_reconcile.env' in oidc_dump_tpl"
          - "'(#oidc)' in oidc_dump_tpl"
          - "'reconcile-gitea-oauth2.sh' in oidc_deploy"
          - "'failed_when: false' in oidc_deploy"
        fail_msg: >
          The Gitea OAuth2 source self-heal must run after the post-dump
          restart (gitea_dump.sh.j2 cleanup, marked (#oidc)) AND after a
          stack deploy (gitea-deploy.yml, failed_when: false) so it never
          blocks Gitea (tier-1/DR-first) from coming up.

    # ================================================================
    # Check 16: gitea container healthcheck tolerates slow DB recovery
    # ================================================================
    # After an unclean restart, Docker's restart_policy=always relaunches
    # gitea and gitea-db independently (there is no depends_on:service_healthy
    # at restart time — that gate only runs during an Ansible deploy). MySQL
    # needs minutes for InnoDB crash recovery; gitea is up but cannot serve
    # HTTP until the DB is reachable. With a 2m healthcheck start_period gitea
    # is marked unhealthy mid-recovery, tripping external monitors / the
    # sidecar self-heal. The start_period must match the gitea-db recovery
    # budget (10m) on BOTH the Tailscale and standalone container variants,
    # paired with the widened DB_RETRIES/DB_RETRY_BACKOFF in app.ini (CHECK 3).
    - name: "CHECK 16: Read gitea_server tasks/main.yml"
      slurp:
        src: "{{ roles_dir }}/gitea_server/tasks/main.yml"
      register: gitea_server_tasks_raw

    - name: "CHECK 16: Decode gitea_server tasks"
      set_fact:
        gitea_server_tasks: "{{ gitea_server_tasks_raw.content | b64decode }}"

    - name: "CHECK 16: Assert gitea healthcheck start_period tolerates DB recovery (10m, both variants)"
      assert:
        that:
          # gitea-db (1) + gitea Tailscale variant (1) + gitea standalone
          # variant (1) = 3 occurrences once the 2m budgets are raised.
          - "gitea_server_tasks.count('start_period: 10m') >= 3"
          - "'start_period: 2m' not in gitea_server_tasks"
        fail_msg: >
          gitea_server/tasks/main.yml must use start_period: 10m for the gitea
          container healthcheck on BOTH the Tailscale and standalone variants
          (alongside the gitea-db healthcheck) so gitea is not marked unhealthy
          while MySQL does InnoDB crash recovery after an unclean restart. The
          old 2m budget is banned. Pairs with the widened DB retry budget in
          app.ini (CHECK 3).

    # ================================================================
    # Check 17: Gitea-stack containers pin the json-file log driver,
    #           never the Synology `db` driver.
    # ================================================================
    # The Synology ContainerManager default `db` log driver wedges
    # (locks/hangs). A wedged driver makes Docker unable to run healthcheck
    # execs (container flips unhealthy) and unable to (re)start containers
    # ("failed to initialize logging driver"), so autoheal's restart leaves
    # them dead — a recurring NAS-wide outage (2026-06-15 incident; also
    # 2026-06-05). Every long-lived gitea-stack container managed HERE must
    # pin log_driver: json-file explicitly. The Tailscale sidecar is now
    # deployed by jaxzin.infra.tailscale_sidecar, which defaults
    # tailscale_log_driver: json-file (the collection owns that guarantee).
    # Reuses gitea_server_tasks (decoded in CHECK 16).
    - name: "CHECK 17: Assert gitea-stack containers pin json-file logging"
      assert:
        that:
          # gitea-db, gitea (sidecar variant), gitea (standalone variant) =
          # 3 occurrences in gitea_server; allow >=3 for future containers.
          - "gitea_server_tasks.split('log_driver: json-file') | length - 1 >= 3"
          # Guard the anti-pattern: no container may pin the wedge-prone db driver.
          - "'log_driver: db' not in gitea_server_tasks"
        fail_msg: >
          Every long-lived gitea-stack container managed in gitea_server
          (gitea-db, gitea) must set 'log_driver: json-file'. The Synology
          default 'db' log driver wedges and breaks healthchecks + restarts,
          taking the whole stack down (2026-06-15 incident).

    # ================================================================
    # Check 18: the Tailscale sidecar is deployed by the pinned
    #           jaxzin.infra collection role, not a local copy (#128)
    # ================================================================
    # The local playbooks/roles/tailscale_sidecar was retired in favour of
    # jaxzin.infra.tailscale_sidecar (pinned). This check locks in the
    # migration contract: the playbook includes the FQCN role (never the bare
    # local name), gates it at play level (the collection role has no internal
    # tailscale_enabled), preserves the outbound-route assert + DNS watchdog
    # wiring, the collection is pinned in galaxy-requirements, and neither the
    # local role nor the stale vendored collection copy survive.
    - name: "CHECK 18: Read gitea-deploy.yml + galaxy-requirements.yml"
      slurp:
        src: "{{ item }}"
      register: migration_sources_raw
      loop:
        - "{{ project_root }}/playbooks/gitea-deploy.yml"
        - "{{ project_root }}/playbooks/galaxy-requirements.yml"

    - name: "CHECK 18: Decode migration sources"
      set_fact:
        migration_deploy: "{{ migration_sources_raw.results[0].content | b64decode }}"
        migration_galaxy: "{{ migration_sources_raw.results[1].content | b64decode }}"

    - name: "CHECK 18: Assert the playbook consumes the pinned collection role"
      assert:
        that:
          - "'jaxzin.infra.tailscale_sidecar' in migration_deploy"
          - "'name: tailscale_sidecar' not in migration_deploy"
          - "'tailscale_assert_tailnet_route: true' in migration_deploy"
          - "'tailscale_dns_watchdog_host_dir' in migration_deploy"
          - "'when: tailscale_enabled | bool' in migration_deploy"
          - "'tailscale_memory_limit: \"0\"' in migration_deploy"
          - "'tailscale_memory_swap: \"0\"' in migration_deploy"
          - "'jaxzin.infra' not in migration_galaxy"
        fail_msg: >
          gitea-deploy.yml must include jaxzin.infra.tailscale_sidecar (FQCN,
          never the bare local 'name: tailscale_sidecar'), set
          tailscale_assert_tailnet_route: true and tailscale_dns_watchdog_host_dir
          for the Gitea sidecar, gate the include with
          'when: tailscale_enabled | bool', and un-cap tailscaled by setting BOTH
          tailscale_memory_limit: "0" and tailscale_memory_swap: "0" (the
          collection's 96m/192m defaults would newly OOM-cap the sidecar). The
          collection is now VENDORED playbook-adjacent (DR-self-contained), NOT
          galaxy-fetched, so jaxzin.infra must NOT appear in
          galaxy-requirements.yml (#128).

    - name: "CHECK 18: Assert the local role is deleted"
      stat:
        path: "{{ roles_dir }}/tailscale_sidecar"
      register: local_sidecar_role_stat

    - name: "CHECK 18: Stat the stale root-level vendored collection copy"
      stat:
        path: "{{ project_root }}/collections/ansible_collections/jaxzin/infra"
      register: old_root_collection_stat

    - name: "CHECK 18: Stat the playbook-adjacent vendored collection"
      stat:
        path: "{{ project_root }}/playbooks/collections/ansible_collections/jaxzin/infra/galaxy.yml"
      register: vendored_collection_stat

    - name: "CHECK 18: Assert the collection is vendored playbook-adjacent (DR-self-contained)"
      assert:
        that:
          - not local_sidecar_role_stat.stat.exists
          - not old_root_collection_stat.stat.exists
          - vendored_collection_stat.stat.exists
        fail_msg: >
          The retired local role (playbooks/roles/tailscale_sidecar) and the
          stale root-level collection copy
          (collections/ansible_collections/jaxzin/infra) must both be gone, and
          the jaxzin.infra collection MUST be vendored playbook-adjacent at
          playbooks/collections/ansible_collections/jaxzin/infra (galaxy.yml
          present) so the deploy + offline tests resolve the FQCN with no Galaxy
          fetch (DR-self-contained, #128).

    # ================================================================
    # Check 19: the vendored tailscale_sidecar keeps the jaxzin.infra#7
    #           DNS watchdog — downstream 127.0.0.11 resolv.conf heal +
    #           upstream accept-dns bounce on MagicDNS SERVFAIL. Without
    #           it a sidecar restart re-breaks Gitea OIDC login (500).
    # ================================================================
    - name: "CHECK 19: Read the vendored dns-watchdog.sh"
      ansible.builtin.slurp:
        src: "{{ project_root }}/playbooks/collections/ansible_collections/jaxzin/infra/roles/tailscale_sidecar/files/dns-watchdog.sh"
      register: dns_watchdog_raw

    - name: "CHECK 19: Decode dns-watchdog.sh"
      ansible.builtin.set_fact:
        dns_watchdog_sh: "{{ dns_watchdog_raw.content | b64decode }}"

    - name: "CHECK 19: Assert the #7 watchdog (downstream heal + upstream accept-dns bounce) is present"
      ansible.builtin.assert:
        that:
          - "'127.0.0.11' in dns_watchdog_sh"
          - "'heal_resolv_conf' in dns_watchdog_sh"
          - "'accept-dns=false' in dns_watchdog_sh"
          - "'bounce_accept_dns' in dns_watchdog_sh"
          - "'probe_upstream' in dns_watchdog_sh"
        fail_msg: >
          The vendored tailscale_sidecar lost the jaxzin.infra#7 DNS watchdog:
          dns-watchdog.sh must keep the downstream 127.0.0.11 resolv.conf heal
          (heal_resolv_conf) AND the upstream watchdog (probe_upstream +
          bounce_accept_dns / accept-dns=false). Without it a sidecar restart
          re-breaks Gitea OIDC (500) and gitea-db resolution.
        success_msg: "jaxzin.infra#7 DNS watchdog present in the vendored role."

    # ================================================================
    # Check 20: the reconcile maintenance-lock path is a SINGLE SOURCE
    #           OF TRUTH shared by stack_reconcile and gitea_backup —
    #           a one-sided edit must trip the suite (architect's MAJOR)
    # ================================================================
    # stack_reconcile's watchdog stands down while a maintenance lock is
    # present so it never races gitea_dump.sh. That only holds if BOTH roles
    # point at the SAME lock file. The two defaults are spelled differently —
    # stack_reconcile factors a `lock_dir` intermediate var, gitea_backup
    # writes the path contiguously — so we assert each effective path ends in
    # the stable, host-neutral suffix '/run/.reconcile-pause'. If anyone moves
    # one side without the other, the backup writes one file while the watchdog
    # watches another and the stand-down silently breaks. check_docker_tasks.py
    # CHECK L resolves the indirection and asserts byte-identity; this is the
    # belt-and-suspenders raw-template grep (CHECK 1 already runs that script).
    - name: "CHECK 20: Read both reconcile lock-path defaults"
      slurp:
        src: "{{ item }}"
      register: reconcile_lock_defaults_raw
      loop:
        - "{{ roles_dir }}/stack_reconcile/defaults/main.yml"
        - "{{ roles_dir }}/gitea_backup/defaults/main.yml"

    - name: "CHECK 20: Decode both reconcile lock-path defaults"
      set_fact:
        # stack_reconcile splits the path across lock_dir ('.../run') +
        # lock_path ('{{ lock_dir }}/.reconcile-pause'); concatenating the two
        # files' text lets one grep see the full '/run' + '/.reconcile-pause'
        # surface on the stack_reconcile side while still matching the
        # contiguous gitea_backup string.
        stack_reconcile_defaults: "{{ reconcile_lock_defaults_raw.results[0].content | b64decode }}"
        gitea_backup_defaults: "{{ reconcile_lock_defaults_raw.results[1].content | b64decode }}"

    - name: "CHECK 20: Assert both roles reference the SAME reconcile lock suffix"
      assert:
        that:
          # gitea_backup writes the path contiguously — match it directly.
          - "'/run/.reconcile-pause' in gitea_backup_defaults"
          # stack_reconcile factors the path through lock_dir; both halves must
          # be present so the effective path is '.../run/.reconcile-pause'.
          - "'/run' in stack_reconcile_defaults"
          - "'/.reconcile-pause' in stack_reconcile_defaults"
        fail_msg: >
          The reconcile maintenance-lock path is a SINGLE SOURCE OF TRUTH
          shared by stack_reconcile (stack_reconcile_lock_path) and gitea_backup
          (gitea_backup_reconcile_lock_path); both must resolve to
          '{{ '{{' }} gitea_data_path {{ '}}' }}/run/.reconcile-pause'. A
          one-sided move makes gitea_dump.sh write one lock file while the
          watchdog watches another, so reconcile stops standing down during a
          backup and races the dump. Move BOTH together, never one. (See
          check_docker_tasks.py CHECK L for the byte-identity assertion.)

    # ================================================================
    # Cleanup
    # ================================================================
    - name: Clean up rendered test files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/test-app-ini-rendered
        - /tmp/test-ts-serve-rendered.json
        - /tmp/test-gitea-runner-config.yml
