# .github/workflows/common-bootstrap.yml
on:
  workflow_call:
    inputs:
      dry_run:
        description: "If true, run Ansible in --check mode"
        required: true
        type: boolean

jobs:
  bootstrap:
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/jaxzin/jaxzin-infra-runner:latest
      # NOTE: do NOT add `options: --dns ${{ secrets.LAN_DNS }}` here.
      # GitHub Actions evaluates `container.options` at workflow-load time,
      # before any of `secrets`, `inputs.<workflow_call-input>`-passed-from-
      # secrets, or other secret-derived contexts are available. Both of
      # those were tried (PR #16's direct `secrets.LAN_DNS`; PR #85's
      # `inputs.lan_dns` via `with:` passed from caller `secrets.LAN_DNS`)
      # and BOTH failed schema validation with:
      #   "Unrecognized named-value: 'secrets'"
      # The runtime DNS-override step below (first step of this job) does
      # the same job from inside the running container, where `secrets`
      # context IS available.
    env:
      CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      DNSIMPLE_OAUTH_TOKEN: ${{ secrets.DNSIMPLE_OAUTH_TOKEN }}
      GITEA_ADMIN_USERNAME: ${{ vars.GITEA_ADMIN_USERNAME || vars.MYGITEA_ADMIN_USERNAME }}
      GITEA_ADMIN_PASSWORD: ${{ secrets.GITEA_ADMIN_PASSWORD || secrets.MYGITEA_ADMIN_PASSWORD }}
      GITEA_ADMIN_EMAIL: ${{ vars.GITEA_ADMIN_EMAIL || vars.MYGITEA_ADMIN_EMAIL }}
      GITEA_DB_PASSWORD: ${{ secrets.GITEA_DB_PASSWORD || secrets.MYGITEA_DB_PASSWORD }}
      GITEA_LAN_HOST: ${{ secrets.GITEA_LAN_HOST || secrets.MYGITEA_LAN_HOST }}
      GITEA_LAN_SSH_PORT: ${{ secrets.GITEA_LAN_SSH_PORT || secrets.MYGITEA_LAN_SSH_PORT }}
      LAN_DOMAIN_SUFFIX: ${{ secrets.LAN_DOMAIN_SUFFIX }}
      # Non-secret (public ERNW release URL + its sha256) → Variables, not
      # Secrets. Consumed by the gitea_runner role to fetch the static
      # socat that gives job containers an ssh->tailnet SOCKS5 path
      # (Gitea #25; see docs/runbooks/job-container-tailnet-ssh.md).
      GITEA_RUNNER_SOCKS_HELPER_URL: ${{ vars.GITEA_RUNNER_SOCKS_HELPER_URL }}
      GITEA_RUNNER_SOCKS_HELPER_SHA256: ${{ vars.GITEA_RUNNER_SOCKS_HELPER_SHA256 }}
      GITEA_RESTORE: ${{ inputs.recover }}
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_SSH_USER: ${{ secrets.NAS_SSH_USER }}
      NAS_SSH_PASSWORD: ${{ secrets.NAS_SSH_PASSWORD }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      TS_TAILNET: ${{ secrets.TS_TAILNET }}
    steps:
      # Must run BEFORE actions/checkout, which is the first network-using
      # step. /etc/resolv.conf inside a Docker user-defined network is
      # writable (it's an in-memory copy, not a host bind-mount), so
      # overwriting it from a step works. Subsequent processes look up
      # nameserver(s) here for every resolution. Includes MagicDNS as a
      # fallback so tailnet hostnames (e.g. the Gitea origin URL used by
      # checkout when triggered from the Gitea-side deploy.yml caller)
      # also resolve. See docs/architecture/tailscale-sidecar-modes.md
      # for the broader LAN-vs-tailnet DNS asymmetry context.
      - name: Configure LAN DNS resolution inside container
        env:
          LAN_DNS: ${{ secrets.LAN_DNS }}
        # The runner container's default shell is `sh`/`dash`, not bash —
        # `set -o pipefail` is bash-only and would fail "Illegal option".
        # The script has no pipes, so `set -eu` (POSIX) is sufficient.
        run: |
          set -eu
          printf 'nameserver %s\nnameserver %s\n' "$LAN_DNS" 100.100.100.100 > /etc/resolv.conf
          echo "Configured /etc/resolv.conf:"
          cat /etc/resolv.conf

      - name: Checkout IaC
        uses: actions/checkout@v4

      - name: Set up Ansible in a venv if needed
        run: |
          if ! (command -v ansible-playbook &> /dev/null && command -v ansible-galaxy &> /dev/null); then
            echo "Ansible not found, installing into a virtual environment..."
            python3 --version
            python3 -m venv .venv
            .venv/bin/pip install ansible==11.7.0
            echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
          else
            echo "Ansible is already available on the PATH."
          fi

      - name: Deploy infrastructure
        id: deploy
        uses: dawidd6/action-ansible-playbook@v4
        with:
          playbook: gitea-deploy.yml
          directory: ./playbooks
          configuration: |
            [ssh_connection]
            pipelining = True
            ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%%h-%%p-%%r
          key: ${{ secrets.SSH_KEY }}
          inventory: |
            [nas]
            ${{ secrets.NAS_HOST }} ansible_user="${{ secrets.NAS_SSH_USER }}" ansible_become_password="${{ secrets.NAS_SSH_PASSWORD }}"
          requirements: galaxy-requirements.yml
          options: ${{ inputs.dry_run && '--check --diff' || '' }}
