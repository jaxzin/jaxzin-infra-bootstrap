# .github/workflows/health-check.yml
name: Infrastructure Health Check

on:
  schedule:
    - cron: '0 0 * * *'  # daily

jobs:
  health-check:
    uses: ./.github/workflows/common-bootstrap.yml
    with:
      dry_run: true
    secrets: inherit

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Notify Discord on failure
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: ":rotating_light: The daily infrastructure health check failed!"

  notify-on-success:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - name: Notify Discord on success
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: ":white_check_mark: The daily infrastructure health check passed."

  # Daily drift detection for the tofu/network root module (UniFi static DNS).
  # Exit code 0 = no drift (silent). Exit 2 = drift detected. Exit 1 = error.
  # Notifications never include the drift diff itself - they only point the
  # operator at the workflow run, where private details can be reviewed.
  # Job ID is `tofu-network-drift` (not the bare `network-drift`) to anchor
  # the drift-class unambiguously to the IaC source — distinguishes it from
  # any future Tailscale/route/VLAN drift checks that might land here.
  tofu-network-drift:
    name: tofu/network drift check
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/jaxzin/jaxzin-infra-runner:latest
      # NOTE: do NOT add `options: --dns ${{ secrets.LAN_DNS }}` here.
      # GitHub Actions evaluates `container.options` at workflow-load time,
      # before the `secrets` context is available, so it fails schema
      # validation with "Unrecognized named-value: 'secrets'". The runtime
      # DNS-override step below (first step of this job) does the same job
      # from inside the running container, where `secrets` IS available.
      # PR #86 applied this identical fix to common-bootstrap.yml.
    env:
      TF_VAR_unifi_api_url:    ${{ secrets.UNIFI_API_URL }}
      TF_VAR_unifi_username:   ${{ secrets.UNIFI_USERNAME }}
      TF_VAR_unifi_password:   ${{ secrets.UNIFI_PASSWORD }}
      TF_VAR_unifi_site:       ${{ secrets.UNIFI_SITE }}
      # INTERIM (see issue #95): UCG-Max self-signed cert SAN mismatch — skip
      # TLS verification for this LAN-only, dedicated-CI-user connection until
      # the publicly-trusted-cert long-term fix (#95) lands.
      TF_VAR_unifi_insecure:   "true"
      TF_VAR_unifi_static_dns: |
        [
          {
            "name":  "${{ secrets.GITEA_LAN_FQDN || secrets.MYGITEA_LAN_FQDN }}",
            "value": "${{ secrets.GITEA_LAN_HOST || secrets.MYGITEA_LAN_HOST }}",
            "type":  "A"
          }
        ]
      AWS_ACCESS_KEY_ID:     ${{ secrets.B2_APPLICATION_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_S3_ENDPOINT:        ${{ secrets.B2_S3_ENDPOINT }}
      B2_REGION:             ${{ secrets.B2_REGION }}
      TOFU_STATE_BUCKET:     ${{ secrets.TOFU_STATE_BUCKET }}
      TOFU_STATE_KEY:        ${{ secrets.TOFU_STATE_KEY }}
    defaults:
      run:
        working-directory: tofu/network
    steps:
      # Must run BEFORE actions/checkout (the first network-using step).
      # /etc/resolv.conf inside a Docker user-defined network is an in-memory
      # copy, not a host bind-mount, so overwriting it from a step works.
      # 100.100.100.100 (MagicDNS) is a fallback so tailnet hostnames still
      # resolve. See PR #86 / common-bootstrap.yml for the origin of this
      # pattern and docs/architecture/tailscale-sidecar-modes.md for the
      # LAN-vs-tailnet DNS asymmetry context.
      - name: Configure LAN DNS resolution inside container
        # This job sets defaults.run.working-directory: tofu/network, which
        # does not exist until checkout. Override to / so this pre-checkout
        # step has a valid cwd; it only writes the absolute path
        # /etc/resolv.conf, so the directory is otherwise irrelevant.
        working-directory: /
        env:
          LAN_DNS: ${{ secrets.LAN_DNS }}
        # Container default shell is sh/dash, not bash — no `set -o pipefail`
        # (bash-only, "Illegal option"). No pipes here, so `set -eu` suffices.
        run: |
          set -eu
          printf 'nameserver %s\nnameserver %s\n' "$LAN_DNS" 100.100.100.100 > /etc/resolv.conf
          echo "Configured /etc/resolv.conf:"
          cat /etc/resolv.conf

      - uses: actions/checkout@v7

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.10.0"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="endpoint=${B2_S3_ENDPOINT}" \
            -backend-config="bucket=${TOFU_STATE_BUCKET}" \
            -backend-config="key=${TOFU_STATE_KEY}" \
            -backend-config="region=${B2_REGION}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_lockfile=false" \
            -backend-config="force_path_style=true"

      - name: plan with detailed exit code
        id: plan
        # Capture the exit code without failing the step so the notify
        # branches below can fan out on its value.
        run: |
          set +e
          tofu plan -input=false -detailed-exitcode
          ec=$?
          set -e
          echo "exitcode=${ec}" >> "$GITHUB_OUTPUT"
          # Re-emit semantic outcome for the GitHub UI without leaking the diff.
          case "${ec}" in
            0) echo "no drift" ;;
            2) echo "drift detected" ;;
            *) echo "plan errored (exit ${ec})" ;;
          esac

      - name: Notify Discord on drift
        if: steps.plan.outputs.exitcode == '2'
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: ":warning: tofu/network drift detected. Investigate the workflow run for details."

      - name: Notify Discord on plan error
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: ":octagonal_sign: tofu/network drift check errored. Investigate the workflow run for details."
