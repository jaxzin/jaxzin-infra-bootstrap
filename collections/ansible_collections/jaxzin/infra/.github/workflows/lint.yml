---
# Enforces the repository's .ansible-lint configuration on every push to main
# and every pull request. Without this, the .ansible-lint config (which
# deliberately downgrades var-naming[no-role-prefix] for the tailscale_* public
# API) is never actually run and regressions go unnoticed.
#
# Tool versions are pinned so that local runs match CI exactly and a future
# ansible-lint release cannot turn the build red without a deliberate bump.
name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the collection
        uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Create a virtualenv with pinned Ansible + ansible-lint
        run: |
          uv venv --python 3.12
          uv pip install ansible==14.0.0 ansible-lint==26.4.0

      - name: Show tool versions
        run: uv run ansible-lint --version

      - name: Run ansible-lint
        run: uv run ansible-lint

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out the collection
        uses: actions/checkout@v6.0.3

      - name: Run shellcheck on the DNS watchdog script
        run: shellcheck roles/tailscale_sidecar/files/dns-watchdog.sh

  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - name: Check out the collection
        uses: actions/checkout@v6.0.3

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run the DNS watchdog unit tests
        run: bats roles/tailscale_sidecar/tests/
