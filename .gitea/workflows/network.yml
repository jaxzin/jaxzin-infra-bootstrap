# .gitea/workflows/network.yml
name: Network IaC

on:
  push:
    branches: [main]
    paths:
      - "tofu/network/**"
      - ".gitea/workflows/network.yml"
  pull_request:
    paths:
      - "tofu/network/**"
      - ".gitea/workflows/network.yml"

jobs:
  network:
    runs-on: [self-hosted, linux]
    container:
      image: ghcr.io/jaxzin/jaxzin-infra-runner:latest
      options: --dns ${{ secrets.LAN_DNS }} --dns 100.100.100.100
    env:
      # OpenTofu reads TF_VAR_* into module variables.
      TF_VAR_unifi_api_url:    ${{ secrets.UNIFI_API_URL }}
      TF_VAR_unifi_username:   ${{ secrets.UNIFI_USERNAME }}
      TF_VAR_unifi_password:   ${{ secrets.UNIFI_PASSWORD }}
      TF_VAR_unifi_site:       ${{ secrets.UNIFI_SITE }}
      # The DNS list is built inline from individual Secrets so this repo's
      # records stay parameterized via the same env-var pattern as everything
      # else. Add to TF_VAR_unifi_static_dns if more records land in this repo.
      TF_VAR_unifi_static_dns: |
        [
          {
            "name":  "${{ secrets.GITEA_LAN_FQDN || secrets.MYGITEA_LAN_FQDN }}",
            "value": "${{ secrets.GITEA_LAN_HOST || secrets.MYGITEA_LAN_HOST }}",
            "type":  "A"
          }
        ]
      # S3-compat backend creds (B2)
      AWS_ACCESS_KEY_ID:     ${{ secrets.B2_APPLICATION_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      # Backend config values
      B2_S3_ENDPOINT:        ${{ secrets.B2_S3_ENDPOINT }}
      B2_REGION:             ${{ secrets.B2_REGION }}
      TOFU_STATE_BUCKET:     ${{ secrets.TOFU_STATE_BUCKET }}
      TOFU_STATE_KEY:        ${{ secrets.TOFU_STATE_KEY }}
      # For dig verification step
      LAN_DNS:               ${{ secrets.LAN_DNS }}
      GITEA_LAN_FQDN:        ${{ secrets.GITEA_LAN_FQDN || secrets.MYGITEA_LAN_FQDN }}
      GITEA_LAN_HOST:        ${{ secrets.GITEA_LAN_HOST || secrets.MYGITEA_LAN_HOST }}
      # For Discord notification on failure
      DISCORD_WEBHOOK:       ${{ secrets.DISCORD_WEBHOOK }}

    defaults:
      run:
        working-directory: tofu/network

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.0"

      - name: tofu fmt
        run: tofu fmt -check -recursive

      - name: tofu init
        run: |
          tofu init \
            -backend-config="endpoint=${B2_S3_ENDPOINT}" \
            -backend-config="bucket=${TOFU_STATE_BUCKET}" \
            -backend-config="key=${TOFU_STATE_KEY}" \
            -backend-config="region=${B2_REGION}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_lockfile=false" \
            -backend-config="force_path_style=true"

      - name: tofu validate
        run: tofu validate

      - name: Network diagnostics (job-container state)
        continue-on-error: true
        env:
          DIAG_UNIFI_URL: ${{ secrets.UNIFI_API_URL }}
          DIAG_TS_TAILNET: ${{ secrets.TS_TAILNET }}
          DIAG_LAN_FQDN: ${{ secrets.GITEA_LAN_FQDN || secrets.MYGITEA_LAN_FQDN }}
        run: |
          set +e
          echo "=================================================="
          echo "  NETWORK DIAGNOSTICS (run inside job container)"
          echo "=================================================="

          echo; echo "----- /etc/resolv.conf -----"
          cat /etc/resolv.conf

          echo; echo "----- /etc/hosts -----"
          cat /etc/hosts

          echo; echo "----- ip addr (first 50 lines) -----"
          ip addr 2>&1 | head -50

          echo; echo "----- ip route -----"
          ip route 2>&1

          echo; echo "----- ping LAN_DNS (192.168.10.1 masked) -----"
          ping -c 2 -W 2 "$LAN_DNS" 2>&1 | head -5

          echo; echo "----- ping MagicDNS 100.100.100.100 -----"
          ping -c 2 -W 2 100.100.100.100 2>&1 | head -5

          echo; echo "----- TCP test LAN_DNS:53 (nc) -----"
          timeout 3 bash -c "echo > /dev/tcp/$LAN_DNS/53" 2>&1 && echo "TCP 53 to LAN_DNS open" || echo "TCP 53 to LAN_DNS failed/timeout"

          echo; echo "----- TCP test 100.100.100.100:53 (nc) -----"
          timeout 3 bash -c "echo > /dev/tcp/100.100.100.100/53" 2>&1 && echo "TCP 53 to MagicDNS open" || echo "TCP 53 to MagicDNS failed/timeout"

          # Derive bare hostname for UniFi URL
          UNIFI_HOST="${DIAG_UNIFI_URL#https://}"
          UNIFI_HOST="${UNIFI_HOST#http://}"
          UNIFI_HOST="${UNIFI_HOST%%/*}"
          echo; echo "----- Resolving UniFi host (UNIFI_API_URL bare hostname is masked in log) -----"
          getent hosts "$UNIFI_HOST" 2>&1 || echo "getent failed (rc=$?)"

          echo; echo "----- dig UniFi host via LAN_DNS -----"
          dig +tries=1 +timeout=3 "@$LAN_DNS" "$UNIFI_HOST" 2>&1 | tail -20

          echo; echo "----- dig UniFi host via MagicDNS -----"
          dig +tries=1 +timeout=3 @100.100.100.100 "$UNIFI_HOST" 2>&1 | tail -20

          echo; echo "----- dig Gitea tailnet host via LAN_DNS -----"
          dig +tries=1 +timeout=3 "@$LAN_DNS" "gitea.${DIAG_TS_TAILNET}" 2>&1 | tail -20

          echo; echo "----- dig Gitea tailnet host via MagicDNS -----"
          dig +tries=1 +timeout=3 @100.100.100.100 "gitea.${DIAG_TS_TAILNET}" 2>&1 | tail -20

          echo; echo "----- curl UniFi controller (TLS-skip-verify, 3s) -----"
          curl -sS -k --max-time 3 "${DIAG_UNIFI_URL}/api/login" -o /dev/null -w "HTTP %{http_code} | resolve=%{time_namelookup}s connect=%{time_connect}s total=%{time_total}s\n" 2>&1 || echo "curl failed (rc=$?)"

          echo; echo "----- curl B2 endpoint (sanity check internet) -----"
          curl -sS --max-time 3 "https://s3.us-west-000.backblazeb2.com/" -o /dev/null -w "HTTP %{http_code} | total=%{time_total}s\n" 2>&1 || echo "curl failed (rc=$?)"

          echo; echo "=================================================="
          echo "  END DIAGNOSTICS"
          echo "=================================================="
          # Always succeed — diagnostic is informational
          exit 0

      - name: tofu plan
        run: tofu plan -out=plan.out -input=false

      - name: Plan summary (counts only — never the diff body)
        run: |
          tofu show -json plan.out > plan.json
          add=$(jq '[.resource_changes[] | select(.change.actions | index("create"))] | length' plan.json)
          chg=$(jq '[.resource_changes[] | select(.change.actions | index("update"))] | length' plan.json)
          del=$(jq '[.resource_changes[] | select(.change.actions | index("delete"))] | length' plan.json)
          echo "Plan: ${add} to add, ${chg} to change, ${del} to destroy."

      - name: tofu apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tofu apply -input=false -auto-approve plan.out

      - name: Verify DNS resolution after apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Allow the controller a moment to propagate to dnsmasq.
          for i in 1 2 3 4 5 6; do
            result=$(dig +short "${GITEA_LAN_FQDN}" @"${LAN_DNS}")
            if [ "${result}" = "${GITEA_LAN_HOST}" ]; then
              echo "dig verification OK"
              exit 0
            fi
            echo "attempt ${i}: got '${result}', expected '${GITEA_LAN_HOST}'; sleeping 5s"
            sleep 5
          done
          echo "ERROR: DNS did not propagate to expected value within 30s"
          exit 1
